name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Becomes e.g. ghcr.io/your-github-username/pikorua-adflow
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Build Docker image and push to GitHub Container Registry ─────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag every build with its commit SHA
            type=sha,prefix=sha-
            # Tag pushes to main as "latest"
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Only push on real commits to main, not on pull-request builds
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — dramatically speeds up repeat builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to production server ─────────────────────────────────────────
  # Runs only on pushes to main (not PRs). Requires three repository secrets:
  #
  #   DEPLOY_HOST     — IP or hostname of your VPS / cloud server
  #   DEPLOY_USER     — SSH username (e.g. "ubuntu" or "root")
  #   DEPLOY_SSH_KEY  — private SSH key whose public half is in ~/.ssh/authorized_keys on the server
  #
  # The server is expected to have Docker + Compose installed, and the repo
  # already cloned to /srv/pikorua-adflow with a .env file present.
  #
  # Alternative: if you use Railway, replace this job with a single step:
  #   - run: curl -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}"
  #
  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    if: false  # TODO: remove this line when server is ready and SSH secrets are set

    steps:
      - name: SSH into server and redeploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/pikorua-adflow

            # Pull the latest image from the registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans

            # Clean up old images to save disk space
            docker image prune -f

            echo "Deploy complete — $(docker compose ps --format '{{.Name}} {{.State}}')"
