<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikorua — Campaign Launch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f7f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0dbd0;
      border-radius: 4px;
      padding: 2.5rem 3rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .logo {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8a7d6e;
      margin-bottom: 0.4rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #8a7d6e;
      margin-bottom: 2rem;
      font-style: italic;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5a5040;
      margin-bottom: 0.4rem;
    }

    input, select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d8d0c4;
      border-radius: 2px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fdfcf9;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #8a7d6e;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      background: #1a1a1a;
      color: #f7f5f0;
      border: none;
      border-radius: 2px;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    button:hover { background: #3a3028; }
    button:disabled { background: #b0a898; cursor: not-allowed; }

    #status-box {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      border-radius: 2px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .status-queued   { background: #f0ede6; border: 1px solid #c8bfb0; color: #5a5040; }
    .status-running  { background: #eef4f0; border: 1px solid #a8c8b0; color: #2d5038; }
    .status-complete { background: #f0f4ee; border: 1px solid #9ab898; color: #2a4030; }
    .status-failed   { background: #fdf0ee; border: 1px solid #d0a8a0; color: #5a2820; }

    .run-id {
      font-size: 0.75rem;
      color: #8a7d6e;
      margin-top: 0.5rem;
      font-family: 'Courier New', monospace;
    }

    .review-path {
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      word-break: break-all;
      margin-top: 0.3rem;
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #9ab898;
      border-top-color: #2d5038;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.4rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #results-section {
      display: none;
      margin-top: 2rem;
    }

    .results-heading {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a7d6e;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e0dbd0;
    }

    .variant-card {
      background: #fdfcf9;
      border: 1px solid #e0dbd0;
      border-radius: 3px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }

    .variant-card.flagged {
      border-left: 3px solid #c8905a;
    }

    .variant-card.passed {
      border-left: 3px solid #7aaa88;
    }

    .variant-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a7d6e;
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .variant-badge {
      font-size: 0.65rem;
      padding: 1px 7px;
      border-radius: 2px;
      font-style: normal;
    }

    .badge-pass { background: #eef4f0; color: #2a4030; }
    .badge-flag { background: #fdf3ec; color: #7a4020; }
    .badge-rewrite { background: #f0f0f8; color: #2a2060; }

    .copy-headline {
      font-size: 1rem;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 0.3rem;
    }

    .copy-body {
      font-size: 0.88rem;
      color: #5a5040;
      line-height: 1.5;
      margin-bottom: 0.6rem;
    }

    .scores-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .score-chip {
      font-size: 0.7rem;
      color: #8a7d6e;
    }

    .score-chip span {
      font-weight: bold;
      color: #1a1a1a;
    }

    .rewrite-block {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px dashed #d0c8b8;
    }

    .rewrite-label {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6060a0;
      margin-bottom: 0.35rem;
    }

    .flag-reason {
      font-size: 0.78rem;
      color: #7a4020;
      font-style: italic;
      margin-bottom: 0.5rem;
    }

    .summary-line {
      font-size: 0.82rem;
      color: #2a4030;
      padding: 0.6rem 0.75rem;
      background: #eef4f0;
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    .view-raw-btn {
      font-size: 0.75rem;
      color: #8a7d6e;
      background: none;
      border: 1px solid #d0c8b8;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 2px;
      width: auto;
      margin-top: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: none;
    }

    .view-raw-btn:hover { background: #f0ede6; }

    #raw-copy {
      display: none;
      margin-top: 0.75rem;
      background: #f7f5f0;
      border: 1px solid #e0dbd0;
      border-radius: 2px;
      padding: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      white-space: pre-wrap;
      color: #3a3028;
      max-height: 400px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:baseline;">
    <div class="logo">Pikorua Realty</div>
    <a href="/runs" style="font-size:0.75rem;color:#8a7d6e;text-decoration:none;letter-spacing:0.05em;">View all runs ›</a>
  </div>
  <h1>Launch Campaign</h1>
  <p class="subtitle">Internal tool — AI-generated drafts for human review only</p>

  <form id="brief-form">

    <div class="field">
      <label for="property_name">Property Name / Description</label>
      <input type="text" id="property_name" name="property_name"
             placeholder="e.g. Oberoi Sky Heights, 3BHK sea-view apartment" required />
    </div>

    <div class="row">
      <div class="field">
        <label for="property_type">Property Type</label>
        <input type="text" id="property_type" name="property_type"
               placeholder="e.g. sea-view apartment" required />
      </div>
      <div class="field">
        <label for="city">City</label>
        <input type="text" id="city" name="city"
               placeholder="e.g. Mumbai" required />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="locality">Locality <span style="text-transform:none;font-size:0.72rem;color:#b0a898;">(optional)</span></label>
        <input type="text" id="locality" name="locality"
               placeholder="e.g. Bandra West, Thaltej" />
      </div>
      <div class="field">
        <label for="campaign_duration_days">Campaign Duration (days)</label>
        <input type="number" id="campaign_duration_days" name="campaign_duration_days"
               placeholder="e.g. 30" min="1" value="30" required />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="price_cr">Price (Crores)</label>
        <input type="text" id="price_cr" name="price_cr"
               placeholder="e.g. 4.5" required />
      </div>
      <div class="field">
        <label for="budget_inr">Campaign Budget (INR)</label>
        <input type="number" id="budget_inr" name="budget_inr"
               placeholder="e.g. 50000" min="1" required />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="platform">Platform</label>
        <select id="platform" name="platform" required>
          <option value="">Select...</option>
          <option value="Meta Ads">Meta Ads</option>
          <option value="Google Ads">Google Ads</option>
          <option value="Meta Ads + Google Ads">Meta + Google</option>
        </select>
      </div>
      <div class="field">
        <label for="goal">Campaign Goal</label>
        <select id="goal" name="goal" required>
          <option value="">Select...</option>
          <option value="Lead Generation">Lead Generation</option>
          <option value="Brand Awareness">Brand Awareness</option>
          <option value="Site Visits">Site Visits</option>
          <option value="WhatsApp Enquiries">WhatsApp Enquiries</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="buyer_type">Buyer Type</label>
        <select id="buyer_type" name="buyer_type" required>
          <option value="HNI/NRI">HNI + NRI</option>
          <option value="HNI">HNI only</option>
          <option value="NRI">NRI only</option>
        </select>
      </div>
      <div class="field">
        <label for="nri_geographies">NRI Geographies <span style="text-transform:none;font-size:0.72rem;color:#b0a898;">(if NRI)</span></label>
        <input type="text" id="nri_geographies" name="nri_geographies"
               placeholder="e.g. UAE, US, UK" />
      </div>
    </div>

    <button type="submit" id="submit-btn">Generate Campaign</button>
  </form>

  <div id="status-box">
    <div id="status-message"></div>
    <div class="run-id" id="run-id-display"></div>
    <div class="review-path" id="review-path-display"></div>
  </div>

  <div id="results-section">
    <div class="results-heading">Generated Copy — Meta Ads</div>
    <div class="summary-line" id="results-summary"></div>
    <div id="variant-cards"></div>
    <button class="view-raw-btn" onclick="toggleRaw()">View raw output</button>
    <pre id="raw-copy"></pre>
  </div>
</div>

<script>
  const form  = document.getElementById('brief-form');
  const btn   = document.getElementById('submit-btn');
  const box   = document.getElementById('status-box');
  const msg   = document.getElementById('status-message');
  const rid   = document.getElementById('run-id-display');
  const rpath = document.getElementById('review-path-display');

  let pollTimer = null;

  function setStatus(cls, html) {
    box.style.display = 'block';
    box.className = cls;
    msg.innerHTML = html;
  }

  function poll(runId) {
    fetch('/status/' + runId)
      .then(r => r.json())
      .then(data => {
        const s = data.status;
        if (s === 'queued') {
          setStatus('status-queued', 'Queued — pipeline starting...');
        } else if (s === 'running_stage1') {
          setStatus('status-running', '<span class="spinner"></span>Stage 1 — researching audience, competitors, trends...');
        } else if (s === 'running_stage2') {
          setStatus('status-running', '<span class="spinner"></span>Stage 2 — generating ad copy, WhatsApp scripts, email...');
        } else if (s === 'running_stage3') {
          setStatus('status-running', '<span class="spinner"></span>Stage 3 — evaluating copy quality, rewriting flagged variants...');
        } else if (s === 'complete') {
          clearInterval(pollTimer);
          const scorecard = data.copy_scorecard_summary ? '<br><small>' + data.copy_scorecard_summary + '</small>' : '';
          setStatus('status-complete', '&#10003; Complete — review your outputs before any deployment.' + scorecard);
          if (data.review_folder) {
            rpath.textContent = 'Saved to: ' + data.review_folder;
          }
          btn.disabled = false;
          loadResults(runId);
        } else if (s === 'failed') {
          clearInterval(pollTimer);
          setStatus('status-failed', '&#10007; Pipeline failed: ' + (data.error || 'unknown error'));
          btn.disabled = false;
        }
      })
      .catch(() => {
        // server momentarily busy — keep polling
      });
  }

  function scoreColor(n) {
    if (n >= 8) return '#2a4030';
    if (n >= 6) return '#5a5040';
    return '#7a4020';
  }

  function renderVariants(variants) {
    const container = document.getElementById('variant-cards');
    container.innerHTML = '';
    variants.forEach(v => {
      const isPassed = v.status === 'PASS';
      const hasRewrite = v.rewrite && (v.rewrite.headline || v.rewrite.body);
      const displayHeadline = hasRewrite ? v.rewrite.headline || v.headline : v.headline;
      const displayBody = hasRewrite ? v.rewrite.body || v.body : v.body;

      const scoresHtml = Object.entries(v.scores || {}).map(([k, val]) => {
        const label = k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        return `<span class="score-chip">${label}: <span style="color:${scoreColor(val)}">${val}/10</span></span>`;
      }).join('');

      const badgeHtml = hasRewrite
        ? '<span class="variant-badge badge-rewrite">Rewritten</span>'
        : isPassed
          ? '<span class="variant-badge badge-pass">Pass</span>'
          : '<span class="variant-badge badge-flag">Flagged</span>';

      const flagHtml = v.flag_reason
        ? `<div class="flag-reason">Flagged: ${v.flag_reason}</div>`
        : '';

      const rewriteHtml = hasRewrite && (v.headline || v.body) ? `
        <div class="rewrite-block">
          <div class="rewrite-label">Rewritten from original</div>
          <div style="font-size:0.82rem;color:#8a7d6e;">
            <em>Original — ${v.headline || '—'}</em><br>
            <em>${v.body || ''}</em>
          </div>
        </div>` : '';

      const card = document.createElement('div');
      card.className = `variant-card ${isPassed || hasRewrite ? 'passed' : 'flagged'}`;
      card.innerHTML = `
        <div class="variant-label">
          <span>Variant ${v.variant}${v.angle ? ' — ' + v.angle : ''}</span>
          ${badgeHtml}
        </div>
        ${displayHeadline ? `<div class="copy-headline">${displayHeadline}</div>` : ''}
        ${displayBody ? `<div class="copy-body">${displayBody}</div>` : ''}
        ${flagHtml}
        <div class="scores-row">${scoresHtml}</div>
        ${rewriteHtml}
      `;
      container.appendChild(card);
    });
  }

  function loadResults(runId) {
    fetch('/results/' + runId)
      .then(r => r.json())
      .then(data => {
        const section = document.getElementById('results-section');
        const summary = document.getElementById('results-summary');
        section.style.display = 'block';
        summary.textContent = data.summary || 'Copy evaluation complete.';
        if (data.variants && data.variants.length > 0) {
          renderVariants(data.variants);
        } else if (data.ad_copy_raw) {
          // Fallback: scorecard couldn't be parsed, show raw
          document.getElementById('raw-copy').textContent = data.ad_copy_raw;
          document.getElementById('raw-copy').style.display = 'block';
        }
        if (data.ad_copy_raw) {
          document.getElementById('raw-copy').textContent = data.ad_copy_raw;
        }
      })
      .catch(() => { /* results not critical — don't break the page */ });
  }

  function toggleRaw() {
    const el = document.getElementById('raw-copy');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    btn.disabled = true;
    rpath.textContent = '';
    rid.textContent = '';

    const payload = {
      property_name:          form.property_name.value.trim(),
      platform:               form.platform.value,
      goal:                   form.goal.value,
      budget_inr:             parseInt(form.budget_inr.value, 10),
      city:                   form.city.value.trim(),
      locality:               form.locality.value.trim(),
      property_type:          form.property_type.value.trim(),
      price_cr:               form.price_cr.value.trim(),
      buyer_type:             form.buyer_type.value,
      nri_geographies:        form.nri_geographies.value.trim(),
      campaign_duration_days: parseInt(form.campaign_duration_days.value, 10),
    };

    setStatus('status-queued', 'Submitting...');

    fetch('/launch-campaign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    .then(r => r.json())
    .then(data => {
      if (data.run_id) {
        rid.textContent = 'Run ID: ' + data.run_id;
        setStatus('status-queued', 'Queued — pipeline starting...');
        pollTimer = setInterval(() => poll(data.run_id), 4000);
      } else {
        setStatus('status-failed', 'Unexpected response: ' + JSON.stringify(data));
        btn.disabled = false;
      }
    })
    .catch(err => {
      setStatus('status-failed', 'Could not reach server: ' + err.message);
      btn.disabled = false;
    });
  });
</script>

</body>
</html>
