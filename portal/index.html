<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikorua — Campaign Launch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f7f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0dbd0;
      border-radius: 4px;
      padding: 2.5rem 3rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .logo {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8a7d6e;
      margin-bottom: 0.4rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #8a7d6e;
      margin-bottom: 2rem;
      font-style: italic;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5a5040;
      margin-bottom: 0.4rem;
    }

    input, select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d8d0c4;
      border-radius: 2px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fdfcf9;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #8a7d6e;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      background: #1a1a1a;
      color: #f7f5f0;
      border: none;
      border-radius: 2px;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    button:hover { background: #3a3028; }
    button:disabled { background: #b0a898; cursor: not-allowed; }

    #status-box {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      border-radius: 2px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .status-queued   { background: #f0ede6; border: 1px solid #c8bfb0; color: #5a5040; }
    .status-running  { background: #eef4f0; border: 1px solid #a8c8b0; color: #2d5038; }
    .status-complete { background: #f0f4ee; border: 1px solid #9ab898; color: #2a4030; }
    .status-failed   { background: #fdf0ee; border: 1px solid #d0a8a0; color: #5a2820; }

    .run-id {
      font-size: 0.75rem;
      color: #8a7d6e;
      margin-top: 0.5rem;
      font-family: 'Courier New', monospace;
    }

    .review-path {
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      word-break: break-all;
      margin-top: 0.3rem;
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #9ab898;
      border-top-color: #2d5038;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.4rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:baseline;">
    <div class="logo">Pikorua Realty</div>
    <a href="/runs" style="font-size:0.75rem;color:#8a7d6e;text-decoration:none;letter-spacing:0.05em;">View all runs ›</a>
  </div>
  <h1>Launch Campaign</h1>
  <p class="subtitle">Internal tool — AI-generated drafts for human review only</p>

  <form id="brief-form">

    <div class="field">
      <label for="property_name">Property Name / Description</label>
      <input type="text" id="property_name" name="property_name"
             placeholder="e.g. Oberoi Sky Heights, 3BHK sea-view apartment" required />
    </div>

    <div class="row">
      <div class="field">
        <label for="property_type">Property Type</label>
        <input type="text" id="property_type" name="property_type"
               placeholder="e.g. sea-view apartment" required />
      </div>
      <div class="field">
        <label for="city">City</label>
        <input type="text" id="city" name="city"
               placeholder="e.g. Mumbai" required />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="locality">Locality <span style="text-transform:none;font-size:0.72rem;color:#b0a898;">(optional)</span></label>
        <input type="text" id="locality" name="locality"
               placeholder="e.g. Bandra West, Thaltej" />
      </div>
      <div class="field">
        <label for="campaign_duration_days">Campaign Duration (days)</label>
        <input type="number" id="campaign_duration_days" name="campaign_duration_days"
               placeholder="e.g. 30" min="1" value="30" required />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="price_cr">Price (Crores)</label>
        <input type="text" id="price_cr" name="price_cr"
               placeholder="e.g. 4.5" required />
      </div>
      <div class="field">
        <label for="budget_inr">Campaign Budget (INR)</label>
        <input type="number" id="budget_inr" name="budget_inr"
               placeholder="e.g. 50000" min="1" required />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="platform">Platform</label>
        <select id="platform" name="platform" required>
          <option value="">Select...</option>
          <option value="Meta Ads">Meta Ads</option>
          <option value="Google Ads">Google Ads</option>
          <option value="Meta Ads + Google Ads">Meta + Google</option>
        </select>
      </div>
      <div class="field">
        <label for="goal">Campaign Goal</label>
        <select id="goal" name="goal" required>
          <option value="">Select...</option>
          <option value="Lead Generation">Lead Generation</option>
          <option value="Brand Awareness">Brand Awareness</option>
          <option value="Site Visits">Site Visits</option>
          <option value="WhatsApp Enquiries">WhatsApp Enquiries</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="buyer_type">Buyer Type</label>
        <select id="buyer_type" name="buyer_type" required>
          <option value="HNI/NRI">HNI + NRI</option>
          <option value="HNI">HNI only</option>
          <option value="NRI">NRI only</option>
        </select>
      </div>
      <div class="field">
        <label for="nri_geographies">NRI Geographies <span style="text-transform:none;font-size:0.72rem;color:#b0a898;">(if NRI)</span></label>
        <input type="text" id="nri_geographies" name="nri_geographies"
               placeholder="e.g. UAE, US, UK" />
      </div>
    </div>

    <button type="submit" id="submit-btn">Generate Campaign</button>
  </form>

  <div id="status-box">
    <div id="status-message"></div>
    <div class="run-id" id="run-id-display"></div>
    <div class="review-path" id="review-path-display"></div>
  </div>
</div>

<script>
  const form  = document.getElementById('brief-form');
  const btn   = document.getElementById('submit-btn');
  const box   = document.getElementById('status-box');
  const msg   = document.getElementById('status-message');
  const rid   = document.getElementById('run-id-display');
  const rpath = document.getElementById('review-path-display');

  let pollTimer = null;

  function setStatus(cls, html) {
    box.style.display = 'block';
    box.className = cls;
    msg.innerHTML = html;
  }

  function poll(runId) {
    fetch('/status/' + runId)
      .then(r => r.json())
      .then(data => {
        const s = data.status;
        if (s === 'queued') {
          setStatus('status-queued', 'Queued — pipeline starting...');
        } else if (s === 'running_stage1') {
          setStatus('status-running', '<span class="spinner"></span>Stage 1 — researching audience, competitors, trends...');
        } else if (s === 'running_stage2') {
          setStatus('status-running', '<span class="spinner"></span>Stage 2 — generating ad copy, WhatsApp scripts, email...');
        } else if (s === 'running_stage3') {
          setStatus('status-running', '<span class="spinner"></span>Stage 3 — evaluating copy quality, rewriting flagged variants...');
        } else if (s === 'complete') {
          clearInterval(pollTimer);
          const scorecard = data.copy_scorecard_summary ? '<br><small>' + data.copy_scorecard_summary + '</small>' : '';
          setStatus('status-complete', '&#10003; Complete — review your outputs before any deployment.' + scorecard);
          if (data.review_folder) {
            rpath.textContent = 'Saved to: ' + data.review_folder;
          }
          btn.disabled = false;
        } else if (s === 'failed') {
          clearInterval(pollTimer);
          setStatus('status-failed', '&#10007; Pipeline failed: ' + (data.error || 'unknown error'));
          btn.disabled = false;
        }
      })
      .catch(() => {
        // server momentarily busy — keep polling
      });
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    btn.disabled = true;
    rpath.textContent = '';
    rid.textContent = '';

    const payload = {
      property_name:          form.property_name.value.trim(),
      platform:               form.platform.value,
      goal:                   form.goal.value,
      budget_inr:             parseInt(form.budget_inr.value, 10),
      city:                   form.city.value.trim(),
      locality:               form.locality.value.trim(),
      property_type:          form.property_type.value.trim(),
      price_cr:               form.price_cr.value.trim(),
      buyer_type:             form.buyer_type.value,
      nri_geographies:        form.nri_geographies.value.trim(),
      campaign_duration_days: parseInt(form.campaign_duration_days.value, 10),
    };

    setStatus('status-queued', 'Submitting...');

    fetch('/launch-campaign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    .then(r => r.json())
    .then(data => {
      if (data.run_id) {
        rid.textContent = 'Run ID: ' + data.run_id;
        setStatus('status-queued', 'Queued — pipeline starting...');
        pollTimer = setInterval(() => poll(data.run_id), 4000);
      } else {
        setStatus('status-failed', 'Unexpected response: ' + JSON.stringify(data));
        btn.disabled = false;
      }
    })
    .catch(err => {
      setStatus('status-failed', 'Could not reach server: ' + err.message);
      btn.disabled = false;
    });
  });
</script>

</body>
</html>
