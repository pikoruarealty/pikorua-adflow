# Colour palettes — pure hex data, one home for colour (§3).
# Luxury is not a formula. Deep emerald, burgundy, steel blue, copper are all
# legitimate luxury registers — do NOT default to dark-brown + gold + white.
# Every CTA is either accent-filled (dark text on it) or deep-filled (light text) —
# never a pale outline pill. BatchDedup guarantees no two ads share a palette.

palettes:
  - id: charcoal_gold
    locality_color: "#C9A84C"
    headline_color: "#F5F0E8"
    body_color: "#D4CFC6"
    eyebrow_color: "#C9A84C"
    price_bg: "#1A1A1A"
    price_text: "#C9A84C"
    price_border: "#C9A84C"
    cta_bg: "#C9A84C"
    cta_text: "#1A1A1A"
    scrim_color: "#1A1A1A"
    scrim_opacity: 0.55

