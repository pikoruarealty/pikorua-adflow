{% extends "base.html" %}
{% block title %}PIKORUA — Campaign{% endblock %}

{% block content %}
<div id="detail" data-run-id="{{ run_id }}">

  <!-- Header -->
  <header class="mb-6 border-b border-outline-variant pb-6">
    <p class="label-caps text-outline mb-2">Campaign ID: {{ run_id }}</p>
    <div class="flex justify-between items-end gap-4 flex-wrap">
      <div>
        <h1 id="d-title" class="font-display text-4xl md:text-5xl">Loading…</h1>
        <p id="d-sub" class="text-on-surface-variant mt-2"></p>
      </div>
      <div class="flex gap-3 items-center">
        <span id="approve-state"></span>
        <button id="approve-btn" onclick="approveCampaign()" class="bg-primary text-on-primary rounded label-caps px-6 py-3 hover:bg-surface-tint transition-colors">Approve selected</button>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="flex gap-8 border-b border-outline-variant mb-8">
    <button class="tab label-caps pb-3 -mb-px" data-tab="copy">Copy</button>
    <button class="tab label-caps pb-3 -mb-px" data-tab="visuals">Visuals</button>
    <button class="tab label-caps pb-3 -mb-px" data-tab="audience">Audience &amp; Deploy</button>
    <button class="tab label-caps pb-3 -mb-px" data-tab="optimise">Optimise</button>
  </nav>

  <section id="tab-copy" class="tab-panel"></section>
  <section id="tab-visuals" class="tab-panel hidden"></section>
  <section id="tab-audience" class="tab-panel hidden"></section>
  <section id="tab-optimise" class="tab-panel hidden"></section>

  <!-- Persistent next-step footer (lives outside the panels so re-renders can't wipe it) -->
  <div id="tab-nav" class="mt-10 pt-4 border-t border-outline-variant flex justify-between items-center"></div>

</div>

<div id="lightbox" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center" onclick="closeLightbox()">
  <img id="lightbox-img" src="" class="max-h-[90vh] max-w-[90vw] object-contain shadow-2xl"/>
  <button class="absolute top-4 right-4 text-white material-symbols-outlined text-[32px] hover:text-on-surface-variant transition-colors" onclick="closeLightbox()">close</button>
</div>

{% endblock %}

{% block scripts %}
<script>
const RUN_ID = document.getElementById('detail').dataset.runId;
let DETAIL = null;
const selected = new Set();
const loaded = {};
const generating = new Set();
const PAGE_TS = Date.now();
let OPTIMISE_RECS = [];

/* Image URL with an mtime-based cache key: the URL only changes when the file
   actually changed on disk, so re-rendering the tab (after a generate or an
   assignment) does NOT force the browser to re-download every other image. */
function imgUrl(fname) {
  const v = (DETAIL && DETAIL.image_versions && DETAIL.image_versions[fname]) || PAGE_TS;
  return '/image/' + RUN_ID + '/' + fname + '?t=' + v;
}

/* ── Tabs ── */
const TAB_ORDER = ['copy', 'visuals', 'audience', 'optimise'];
const TAB_LABELS = { copy: 'Copy', visuals: 'Visuals', audience: 'Audience & Deploy', optimise: 'Optimise' };
function renderTabNav(name) {
  const nav = document.getElementById('tab-nav');
  if (!nav) return;
  const i = TAB_ORDER.indexOf(name);
  const prev = i > 0 ? TAB_ORDER[i - 1] : null;
  const next = i >= 0 && i < TAB_ORDER.length - 1 ? TAB_ORDER[i + 1] : null;
  nav.innerHTML =
    (prev
      ? '<button onclick="showTab(\'' + prev + '\'); window.scrollTo({top:0,behavior:\'smooth\'});" ' +
        'class="label-caps border border-outline rounded px-4 py-2 hover:bg-surface-container-low transition-colors inline-flex items-center gap-1.5">' +
        '<span class="material-symbols-outlined text-[15px]">arrow_back</span> ' + TAB_LABELS[prev] + '</button>'
      : '<span></span>') +
    (next
      ? '<button onclick="showTab(\'' + next + '\'); window.scrollTo({top:0,behavior:\'smooth\'});" ' +
        'class="label-caps bg-primary text-on-primary rounded px-5 py-2 hover:bg-surface-tint transition-colors inline-flex items-center gap-1.5">' +
        'Next: ' + TAB_LABELS[next] + ' <span class="material-symbols-outlined text-[15px]">arrow_forward</span></button>'
      : '<span></span>');
}
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
  document.getElementById('tab-' + name).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t => {
    const on = t.dataset.tab === name;
    t.classList.toggle('text-primary', on);
    t.classList.toggle('border-b-2', on);
    t.classList.toggle('border-primary', on);
    t.classList.toggle('text-on-surface-variant', !on);
  });
  renderTabNav(name);
  if (name === 'audience' && !loaded.audience) renderAudience();
  if (name === 'optimise' && !loaded.optimise) renderOptimise();
  if (name === 'visuals') rerenderAssignment();
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => showTab(t.dataset.tab)));

/* ── 10-segment gold score bar ── */
function scoreBar(scores) {
  const vals = Object.values(scores || {});
  if (!vals.length) return '';
  const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
  const filled = Math.round(avg);
  let segs = '';
  for (let i = 0; i < 10; i++) segs += '<div class="seg ' + (i < filled ? 'on' : 'off') + '"></div>';
  return '<div class="flex items-center gap-3">' +
    '<div class="flex gap-1 flex-1 max-w-xs">' + segs + '</div>' +
    '<span class="font-display text-xl">' + avg.toFixed(1) + '</span></div>';
}
function subScores(scores) {
  return Object.entries(scores || {}).map(([k, v]) =>
    '<span class="label-caps text-outline mr-4">' + k.replace(/_/g, ' ') + ' <span class="text-on-background">' + v + '</span></span>'
  ).join('');
}

/* ── Load detail ── */
function loadDetail() {
  return api('/results-data/' + RUN_ID).then(d => {
    DETAIL = d;
    const b = d.brief || {};
    document.getElementById('d-title').textContent = b.property_name || 'Campaign';
    document.getElementById('d-sub').textContent =
      '₹' + (b.price_cr || '') + ' Cr · ' + (b.locality || b.city || '') + ' · ' + (b.platform || '');
    (d.selected_variants || []).forEach(v => selected.add(v));
    if (d.approved) document.getElementById('approve-state').innerHTML = '<span class="label-caps text-ok">✓ Approved</span>';
    renderCopy();
  });
}

/* ── Copy tab ── */
function renderCopy() {
  const d = DETAIL;
  const root = document.getElementById('tab-copy');
  let html = '<div class="flex justify-between items-center mb-4">' +
    '<h2 class="font-headline text-2xl">Meta Ads</h2>' +
    '<button onclick="addVariant()" class="border border-outline rounded label-caps px-4 py-2 hover:bg-surface-container-low transition-colors">+ Add variant</button></div>';
  html += '<div class="space-y-4">';
  (d.variants || []).forEach(v => {
    const sel = selected.has(v.variant);
    const badge = v.revised ? '<span class="label-caps text-warn">Revised</span>'
      : v.status === 'PASS' ? '<span class="label-caps text-ok">Pass</span>'
      : v.status === 'FLAG' ? '<span class="label-caps text-error">Flag</span>'
      : '<span class="label-caps text-outline">Custom</span>';
    html += '<div class="border border-outline-variant p-5" id="vc-' + v.variant + '">' +
      '<div class="flex justify-between items-start mb-3">' +
        '<label class="flex items-center gap-2 label-caps cursor-pointer">' +
          '<input type="checkbox" ' + (sel ? 'checked' : '') + ' onchange="toggleSelect(' + v.variant + ',this.checked)" class="text-primary"/> Select for publish</label>' +
        '<div class="flex items-center gap-3">' + badge +
          (Object.keys(v.scores || {}).length ? '<span class="font-display text-2xl">' + (Object.values(v.scores).reduce((a,b)=>a+b,0)/Object.values(v.scores).length).toFixed(1) + '</span>' : '') +
        '</div></div>' +
      '<div class="font-headline text-xl mb-1" contenteditable id="h-' + v.variant + '">' + esc(v.headline) + '</div>' +
      '<div class="text-on-surface-variant text-sm mb-3" contenteditable id="b-' + v.variant + '">' + esc(v.body) + '</div>' +
      (v.flag_reason ? '<p class="text-sm text-warn italic mb-3">Note: ' + esc(v.flag_reason) + '</p>' : '') +
      '<div class="mb-3">' + (Object.keys(v.scores||{}).length ? subScores(v.scores) : '') + '</div>' +
      '<div class="flex gap-1.5 flex-wrap items-center">' +
        '<button onclick="saveCopy(' + v.variant + ')" class="label-caps border border-outline rounded px-3 py-1.5 hover:bg-surface-container-low transition-colors">Save</button>' +
        '<span class="w-px h-5 bg-outline-variant mx-1"></span>' +
        '<button onclick="rewriteField(' + v.variant + ',\'headline\',this)" class="label-caps text-primary rounded px-2 py-1.5 inline-flex items-center gap-1 hover:bg-primary/10 transition-colors" title="AI rewrite headline"><span class="material-symbols-outlined text-[15px]">restart_alt</span> Headline</button>' +
        '<button onclick="rewriteField(' + v.variant + ',\'body\',this)" class="label-caps text-primary rounded px-2 py-1.5 inline-flex items-center gap-1 hover:bg-primary/10 transition-colors" title="AI rewrite body"><span class="material-symbols-outlined text-[15px]">restart_alt</span> Body</button>' +
        '<button onclick="rescore(' + v.variant + ',this)" class="label-caps text-primary rounded px-2 py-1.5 inline-flex items-center gap-1 hover:bg-primary/10 transition-colors" title="Re-score this variant"><span class="material-symbols-outlined text-[15px]">score</span> Score</button>' +
        '<button onclick="dupVariant(' + v.variant + ')" class="label-caps text-on-surface-variant rounded px-2 py-1.5 inline-flex items-center gap-1 hover:bg-surface-container-low transition-colors" title="Duplicate variant"><span class="material-symbols-outlined text-[15px]">content_copy</span></button>' +
        (d.has_live_ads && !(d.meta_ads || []).some(a => a.variant === v.variant)
          ? '<button onclick="publishAdditionalVariant(' + v.variant + ',this)" class="label-caps text-primary rounded px-2 py-1.5 inline-flex items-center gap-1 hover:bg-primary/10 transition-colors" title="Publish this variant into the already-live campaign"><span class="material-symbols-outlined text-[15px]">publish</span> Add to live campaign</button>'
          : '') +
        '<button onclick="delVariant(' + v.variant + ')" class="label-caps text-error rounded px-2 py-1.5 inline-flex items-center gap-1 hover:bg-error/10 transition-colors ml-auto" title="Delete variant"><span class="material-symbols-outlined text-[15px]">delete</span></button>' +
      '</div>' +
      '<div id="score-' + v.variant + '" class="mt-2 text-sm"></div>' +
      '</div>';
  });
  html += '</div>';
  if ((d.deleted_variants || []).length) {
    html += '<div class="mt-4 border border-outline-variant p-4 bg-surface-container-lowest">' +
      '<p class="label-caps text-outline mb-3">Deleted variants</p>' +
      '<div class="flex flex-wrap gap-2">';
    (d.deleted_variants || []).forEach(function(n) {
      html += '<button onclick="restoreVariant(' + n + ')" class="label-caps border border-outline px-3 py-1 hover:bg-surface-container-low text-on-surface-variant">↩ Restore version ' + n + '</button>';
    });
    html += '</div></div>';
  }
  // Other channels (Google / WhatsApp / Email) — opt-in, generated on demand
  const CH_LABEL = { google: 'Google ads', whatsapp: 'WhatsApp message', email: 'Email' };
  ['google', 'whatsapp', 'email'].forEach(ch => {
    const c = d[ch] || {};
    const label = CH_LABEL[ch] || ch;
    html += '<div class="mt-8" id="chwrap-' + ch + '">';
    if (!c.available) {
      html += '<div class="flex justify-between items-center mb-2">' +
        '<h3 class="font-headline text-xl">' + label + '</h3></div>' +
        '<div class="border border-dashed border-outline-variant p-4 text-sm text-on-surface-variant flex items-center justify-between gap-4">' +
        '<span>Not generated yet — this channel is optional.</span>' +
        '<button id="chgen-' + ch + '" onclick="generateChannel(\'' + ch + '\')" class="label-caps border border-primary text-primary px-3 py-1.5 hover:bg-primary hover:text-on-primary transition-colors whitespace-nowrap">Generate now</button>' +
        '</div>';
    } else {
      html += '<div class="flex justify-between items-center mb-2">' +
        '<h3 class="font-headline text-xl">' + label + (c.edited ? ' <span class="label-caps text-warn">edited</span>' : '') + '</h3>' +
        '<div class="flex gap-2"><button onclick="saveChannel(\'' + ch + '\')" class="label-caps border border-outline px-3 py-1">Save</button>' +
        '<button onclick="revertChannel(\'' + ch + '\')" class="label-caps text-primary px-2 py-1">Revert</button></div></div>' +
        '<pre contenteditable id="ch-' + ch + '" class="border border-outline-variant p-4 text-sm whitespace-pre-wrap font-body">' + esc(c.text || '') + '</pre>';
      if (ch === 'google' && (c.issues || []).length)
        html += '<ul class="mt-2 text-sm text-warn list-disc pl-5">' + c.issues.map(i => '<li>' + esc(i.line + ': ' + i.issue) + '</li>').join('') + '</ul>';
    }
    html += '</div>';
  });
  root.innerHTML = html;
  // Auto-rescore 1.5 s after the user stops editing headline or body
  const _rt = {};
  (d.variants || []).forEach(v => {
    ['h-', 'b-'].forEach(pre => {
      const el = document.getElementById(pre + v.variant);
      if (el) el.addEventListener('input', () => {
        clearTimeout(_rt[v.variant]);
        _rt[v.variant] = setTimeout(() => rescore(v.variant, null), 1500);
      });
    });
  });
}
function toggleSelect(v, on) { on ? selected.add(v) : selected.delete(v); rerenderAssignment(); }
function saveCopy(v) {
  const headline = document.getElementById('h-' + v).textContent.trim();
  const body = document.getElementById('b-' + v).textContent.trim();
  api('/edit-content/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ channel: 'meta', variant: v, headline, body }) })
    .then(() => {
      const vr = (DETAIL.variants || []).find(x => x.variant === v);
      if (vr) { vr.headline = headline; vr.body = body; }
      rerenderAssignment();
      toast('Saved');
    }).catch(e => showError(e.message));
}
function rewriteField(v, field, btn) {
  const origHtml = btn ? btn.innerHTML : null;
  const spin = '<span class="inline-block w-3 h-3 border-2 border-primary border-t-transparent rounded-full animate-spin"></span>';
  if (btn) { btn.disabled = true; btn.innerHTML = spin + (field === 'headline' ? ' Headline…' : ' Body…'); btn.classList.add('cursor-not-allowed', 'opacity-60'); }
  api('/rewrite-copy/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ variant_num: v, field }) })
    .then(d => {
      document.getElementById((field === 'headline' ? 'h-' : 'b-') + v).textContent = d[field];
      // auto-save immediately so reload preserves the rewritten copy
      const headline = document.getElementById('h-' + v).textContent.trim();
      const body = document.getElementById('b-' + v).textContent.trim();
      return api('/edit-content/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ channel: 'meta', variant: v, headline, body }) })
        .then(() => {
          const vr = (DETAIL.variants || []).find(x => x.variant === v);
          if (vr) { vr.headline = headline; vr.body = body; }
          rerenderAssignment();
          toast('Rewritten & saved');
        });
    })
    .catch(e => showError(e.message))
    .finally(() => { if (btn) { btn.disabled = false; btn.innerHTML = origHtml; btn.classList.remove('cursor-not-allowed', 'opacity-60'); } });
}
function rescore(v, btn) {
  const origHtml = btn ? btn.innerHTML : null;
  const spin = '<span class="inline-block w-3 h-3 border-2 border-primary border-t-transparent rounded-full animate-spin"></span>';
  const scoreEl = document.getElementById('score-' + v);
  if (btn) { btn.disabled = true; btn.innerHTML = spin + ' Score…'; btn.classList.add('cursor-not-allowed', 'opacity-60'); }
  if (scoreEl) scoreEl.innerHTML = '<span class="text-on-surface-variant italic">' + spin + ' Scoring…</span>';
  const headline = document.getElementById('h-' + v).textContent.trim();
  const body = document.getElementById('b-' + v).textContent.trim();
  api('/rescore-variant/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ variant_num: v, headline, body }) })
    .then(d => { if (scoreEl) scoreEl.innerHTML = 'New score <strong>' + d.avg + '</strong> · ' + subScores(d.scores) + ' · ' + esc(d.flag); })
    .catch(e => { if (scoreEl) scoreEl.textContent = ''; showError(e.message); })
    .finally(() => { if (btn) { btn.disabled = false; btn.innerHTML = origHtml; btn.classList.remove('cursor-not-allowed', 'opacity-60'); } });
}
function addVariant() { api('/add-variant/' + RUN_ID, { method: 'POST' }).then(() => reloadCopy()).catch(e => showError(e.message)); }
function delVariant(v) {
  if (!confirm('Delete version ' + v + '?')) return;
  api('/delete-variant/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ channel: 'meta', variant: v }) }).then(() => { selected.delete(v); reloadCopy(); }).catch(e => showError(e.message));
}
function saveChannel(ch) {
  const text = document.getElementById('ch-' + ch).textContent;
  api('/edit-content/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ channel: ch, text }) }).then(() => toast('Saved')).catch(e => showError(e.message));
}
function revertChannel(ch) {
  api('/revert-content/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ channel: ch }) }).then(d => { document.getElementById('ch-' + ch).textContent = d.text || ''; }).catch(e => showError(e.message));
}
function generateChannel(ch) {
  const btn = document.getElementById('chgen-' + ch);
  const spin = '<span class="inline-block w-3 h-3 border-2 border-current border-t-transparent rounded-full animate-spin"></span>';
  if (btn) { btn.disabled = true; btn.innerHTML = spin + ' Writing…'; btn.classList.add('cursor-not-allowed', 'opacity-60'); }
  api('/generate-channel/' + RUN_ID + '/' + ch, { method: 'POST' })
    .then(() => reloadCopy())
    .catch(e => {
      showError(e.message);
      if (btn) { btn.disabled = false; btn.innerHTML = 'Generate now'; btn.classList.remove('cursor-not-allowed', 'opacity-60'); }
    });
}
function reloadCopy() { loadDetail(); }
function publishAdditionalVariant(v, btn) {
  if (!confirm('Publish version ' + v + ' as a new ad set on the already-live campaign?')) return;
  const origHtml = btn ? btn.innerHTML : null;
  const spin = '<span class="inline-block w-3 h-3 border-2 border-primary border-t-transparent rounded-full animate-spin"></span>';
  if (btn) { btn.disabled = true; btn.innerHTML = spin + ' Publishing…'; btn.classList.add('cursor-not-allowed', 'opacity-60'); }
  api('/publish-additional-variant/' + RUN_ID + '/' + v, { method: 'POST' })
    .then(() => { toast('Variant ' + v + ' published to live campaign'); reloadCopy(); })
    .catch(e => showError(e.message))
    .finally(() => { if (btn) { btn.disabled = false; btn.innerHTML = origHtml; btn.classList.remove('cursor-not-allowed', 'opacity-60'); } });
}
function dupVariant(v) {
  api('/duplicate-variant/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ channel: 'meta', variant: v }) }).then(() => reloadCopy()).catch(e => showError(e.message));
}
function restoreVariant(v) {
  api('/restore-variant/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ channel: 'meta', variant: v }) }).then(() => reloadCopy()).catch(e => showError(e.message));
}
function assignImgToVariant(variantNum, imageNum) {
  api('/assign-image/' + RUN_ID + '/' + variantNum, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ image_num: imageNum ? parseInt(imageNum, 10) : null }) })
    .then(() => { toast('Image assigned'); loadDetail().then(renderVisuals); })
    .catch(e => showError(e.message));
}

/* ── Visuals tab ── */
function renderVisuals() {
  const d = DETAIL;
  const root = document.getElementById('tab-visuals');
  const allGenerating = generating.size > 0;
  const spinner = '<span class="inline-block w-2.5 h-2.5 border-2 border-on-primary border-t-transparent rounded-full animate-spin"></span>';
  let html = '<div class="flex justify-between items-center mb-5"><h2 class="font-display text-2xl">Visual assets</h2>' +
    '<div class="flex items-center gap-2">' +
    '<button onclick="applyLogo()" class="border border-outline rounded label-caps px-4 py-2 hover:bg-surface-container-low transition-colors inline-flex items-center gap-1.5"><span class="material-symbols-outlined text-[15px]">branding_watermark</span> Apply logo</button>' +
    '<button id="gen-all-btn" onclick="genImages()" ' + (allGenerating ? 'disabled ' : '') +
    'class="bg-primary text-on-primary rounded label-caps px-5 py-2 hover:bg-surface-tint transition-colors inline-flex items-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">' +
    (allGenerating ? spinner + ' Generating…' : 'Generate all') + '</button>' +
    '</div></div>';
  html += '<div class="flex flex-wrap items-center gap-x-5 gap-y-2 mb-4 px-3 py-2.5 bg-surface-container-low border border-outline-variant rounded">' +
    '<span class="label-caps text-outline text-[10px]">Generation settings</span>' +
    '<div class="flex items-center gap-1.5">' +
      '<label class="label-caps text-[10px] text-on-surface-variant" for="gen-ratio">Aspect</label>' +
      '<select id="gen-ratio" class="text-xs border border-outline rounded bg-surface px-2 py-1 text-on-surface">' +
        '<option value="4x5">4:5 Portrait (feed)</option>' +
        '<option value="9x16">9:16 Stories</option>' +
        '<option value="1x1">1:1 Square</option>' +
        '<option value="3x2">3:2 Landscape</option>' +
        '<option value="16x9">16:9 Wide</option>' +
      '</select>' +
    '</div>' +
    '<div class="flex items-center gap-1.5">' +
      '<label class="label-caps text-[10px] text-on-surface-variant" for="gen-quality">Quality</label>' +
      '<select id="gen-quality" class="text-xs border border-outline rounded bg-surface px-2 py-1 text-on-surface">' +
        '<option value="high">High</option>' +
        '<option value="medium">Medium</option>' +
        '<option value="low">Low (fast)</option>' +
      '</select>' +
    '</div>' +
    '<div class="flex items-center gap-1.5">' +
      '<label class="label-caps text-[10px] text-on-surface-variant" for="gen-backend">Engine</label>' +
      '<select id="gen-backend" class="text-xs border border-outline rounded bg-surface px-2 py-1 text-on-surface">' +
        '<option value="ideogram">Ideogram (~₹8)</option>' +
      '</select>' +
    '</div>' +
  '</div>';
  html += '<div id="gen-status" class="text-sm text-on-surface-variant mb-4"></div>';
  const promptCount = (d.image_prompts || []).length;
  const gridCols = promptCount === 5
    ? 'grid-cols-2 sm:grid-cols-3 lg:grid-cols-5'
    : 'grid-cols-2 md:grid-cols-3 lg:grid-cols-4';
  html += '<div class="grid ' + gridCols + ' gap-4">';
  (d.image_prompts || []).forEach(p => {
    const imgName = 'image_' + p.num + '.png';
    const has = (d.existing_images || []).includes(imgName);
    const isGen = generating.has(p.num);
    const variants = (d.existing_images || []).filter(f => new RegExp('^image_' + p.num + '_v\\d+\\.png$').test(f));

function setRefMode(filename, mode) {

    btns[m] = document.getElementById('refmode-' + m + '-' + filename);
    ctrls[m] = document.getElementById('refcontrols-' + m + '-' + filename);
    if (!btns[m]) anyMissing = true;
  });
  if (anyMissing) return;
  REF_MODES.forEach(m => {
    if (m === mode) {
      btns[m].className = btns[m].className.replace('border-outline text-on-surface-variant hover:border-primary hover:text-primary', 'bg-primary text-on-primary border-primary');
      if (ctrls[m]) ctrls[m].classList.remove('hidden');
    } else {
      btns[m].className = btns[m].className.replace('bg-primary text-on-primary border-primary', 'border-outline text-on-surface-variant hover:border-primary hover:text-primary');
      if (ctrls[m]) ctrls[m].classList.add('hidden');
    }
  });
}
function _getRefMode(filename) {

  }

function genRefVariant(filename, btn) {

  const promptEl = document.getElementById('refprompt-' + filename);
  const statusEl = document.getElementById('refpanel-status-' + filename);
  const speed = speedEl ? speedEl.value : 'DEFAULT';
  const sceneVariant = (sceneEl && mode === 'change_scene') ? sceneEl.value : 'lifestyle_private_retreat';
  const customPrompt = promptEl ? promptEl.value.trim() : '';
  const origHtml = btn ? btn.innerHTML : '';
  const spin = '<span class="inline-block w-2 h-2 border border-on-primary border-t-transparent rounded-full animate-spin"></span>';
  if (btn) { btn.disabled = true; btn.innerHTML = spin + ' Generating…'; }
  const statusMsg = mode === 'change_scene' ? 'Extracting layout + generating scene…' :
    mode === 'change_elements' ? 'Restyling ad elements…' : 'Editing copy on reference image…';
  if (statusEl) { statusEl.textContent = statusMsg; statusEl.classList.remove('hidden'); }
  const body = { reference_filename: filename, mode: mode, speed: speed, scene_variant: sceneVariant };
  if (customPrompt) body.custom_prompt = customPrompt;

    method: 'POST',
    headers: { 'Content-Type': 'application/json' },

      const modeLabel = modeLabels[d.mode] || 'Prompt';

function genImages(prompts, mode, exteriorBrief) {
  const isGenAll = !prompts;
  // Generate all excludes opt_in variants
  const promptList = prompts || (DETAIL.image_prompts || []).filter(p => !p.opt_in).map(p => p.num);

  // For "Generate all": if images already exist and no mode decided yet, ask replace or add
  if (isGenAll && !mode) {
    const existing = DETAIL.existing_images || [];
    const hasAny = promptList.some(n => existing.includes('image_' + n + '.png'));
    if (hasAny) {
      showGenAllDialog(promptList);
      return;
    }
  }

  const miniSpin = '<span class="inline-block w-2 h-2 border border-on-primary border-t-transparent rounded-full animate-spin"></span>';
  promptList.forEach(n => {
    generating.add(n);
    const wrap = document.getElementById('img-wrap-' + n);
    if (wrap && !wrap.querySelector('.gen-overlay')) {
      const ov = document.createElement('div');
      ov.className = 'gen-overlay absolute inset-0 bg-surface/80 flex flex-col items-center justify-center gap-2';
      ov.innerHTML = '<span class="inline-block w-7 h-7 border-2 border-primary border-t-transparent rounded-full animate-spin"></span>' +
        '<span class="label-caps text-[9px] text-on-surface-variant">Generating…</span>';
      wrap.appendChild(ov);
    }
    const btn = document.getElementById('gen-btn-' + n);
    if (btn) { btn.disabled = true; btn.innerHTML = miniSpin + ' Working…'; btn.classList.add('cursor-not-allowed'); }
  });
  const genAll = document.getElementById('gen-all-btn');
  if (genAll) {
    genAll.disabled = true;
    genAll.innerHTML = '<span class="inline-block w-2.5 h-2.5 border-2 border-on-primary border-t-transparent rounded-full animate-spin"></span> Generating…';
    genAll.classList.add('cursor-not-allowed');
  }
  document.getElementById('gen-status').innerHTML = 'Generating… this can take a minute.' +
    '<button id="img-cancel-btn" onclick="cancelImages()" class="label-caps text-outline hover:text-error underline ml-3">Cancel</button>';
  const genRatio = (document.getElementById('gen-ratio') || {}).value || '4x5';
  const genQuality = (document.getElementById('gen-quality') || {}).value || 'high';
  const genBackend = (document.getElementById('gen-backend') || {}).value || 'ideogram';
  const basePayload = { ratio: genRatio, quality: genQuality, backend: genBackend };
  if (exteriorBrief) basePayload.exterior_brief = exteriorBrief;
  const payload = mode === 'add'
    ? { ...basePayload, alongside: promptList }
    : { ...basePayload, prompts: promptList };
  api('/generate-images/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
    .then(d => {
      promptList.forEach(n => generating.delete(n));
      const errs = (d.errors || []).map(e => 'Prompt ' + e.prompt + ': ' + e.error).join('; ');
      const cancelNote = d.cancelled ? ' Cancelled — remaining images were not generated.' : '';
      const statusMsg = (d.generated || []).length + ' image(s) generated.' + cancelNote + (errs ? ' ' + errs : '');
      return loadDetail().then(() => { renderVisuals(); refreshLightboxIfShowing(promptList); document.getElementById('gen-status').textContent = statusMsg; })
        .catch(e => { renderVisuals(); document.getElementById('gen-status').textContent = statusMsg + ' (view refresh failed: ' + e.message + ')'; });
    }).catch(e => {
      promptList.forEach(n => {
        generating.delete(n);
        const wrap = document.getElementById('img-wrap-' + n);
        if (wrap) { const ov = wrap.querySelector('.gen-overlay'); if (ov) ov.remove(); }
        const btn = document.getElementById('gen-btn-' + n);
        if (btn) { btn.disabled = false; btn.innerHTML = 'RETRY'; btn.classList.remove('cursor-not-allowed'); btn.classList.add('text-error', 'border-error'); }
      });
      const genAll = document.getElementById('gen-all-btn');
      if (genAll) { genAll.disabled = false; genAll.innerHTML = 'Generate all'; genAll.classList.remove('cursor-not-allowed'); }
      document.getElementById('gen-status').textContent = 'Error: ' + e.message;
    });
}

function buildAssignmentInner() {

  } else if (!selectedVariants.length) {
    h += '<p class="text-sm text-outline italic">No variants selected for publish — check "Select for publish" in the Copy tab.</p>';

    h += '<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">';

        '<div class="w-14 h-[72px] shrink-0 bg-surface-container-low border border-outline-variant overflow-hidden">' +

            : '<div class="w-full h-full flex items-center justify-center"><span class="material-symbols-outlined text-outline text-[20px]">image_not_supported</span></div>') +
        '</div>' +
        '<div class="flex-1 min-w-0">' +
          '<p class="label-caps text-[10px] text-outline mb-0.5">Variant ' + v.variant + (isAuto ? ' · auto' : ' · assigned') + '</p>' +
          '<p class="text-sm truncate mb-2" title="' + esc(v.headline || '') + '">' + esc(v.headline || '(no headline)') + '</p>' +
          '<select class="w-full text-[10px] border border-outline-variant bg-surface px-1 py-1 font-body label-caps" onchange="assignImgToVariant(' + v.variant + ',this.value)">' +
            '<option value="">Auto — image ' + v.variant + '</option>' +

let AUD_STATE = null;
let AUD_POOL = null;
let AUD_GEO_SUGGEST = null;

function renderAudience() {
  loaded.audience = true;
  const root = document.getElementById('tab-audience');
  root.innerHTML = '<p class="text-on-surface-variant">Loading audience…</p>';
  Promise.all([
    api('/audience/' + RUN_ID),
    api('/meta-saved-audiences').catch(() => ({ audiences: [] })),
    api('/audience-pool').catch(() => ({ work_positions: {}, income_clusters: [], industries: [] })),
    api('/lookalike-audiences').catch(() => ({ audiences: [], staleness: {} })),
    api('/saved-target-audiences').catch(() => ({ audiences: [] })),
  ]).then(([d, metaD, pool, lookalikeD, savedD]) => {
    const a = d.audience || {};
    AUD_POOL = pool;
    AUD_STATE = {
      city: a.city || '', city_key: a.city_key || null, region: a.region || '',
      radius_km: a.radius_km || 25,
      geo_mode: a.geo_mode || 'radius',
      neighborhoods: (a.neighborhoods || []).slice(),
      zips: (a.zips || []).slice(),
      platform_os: a.platform_os || 'all',
      interests: (a.interests || []).slice(),
      behaviours: (a.behaviours || []).slice(),
      work_positions: (a.work_positions || []).slice(),
      income_clusters: (a.income_clusters || []).slice(),
      industries: (a.industries || []).slice(),
      relationship_statuses: (a.relationship_statuses || []).slice(),
      nri_countries: (a.nri_countries || []).slice(),
      advantage_plus: a.advantage_plus !== false,
      clientele_type: a.clientele_type || '',
      applied_saved_audience_id: a.applied_saved_audience_id || '',
      has_undo: !!a._pre_apply_audience,
    };
    AUD_GEO_SUGGEST = null;
    // Relevance: an audience whose name shares tokens with this campaign's
    // city/locality/property is almost certainly the one meant for it.
    const briefB = (DETAIL && DETAIL.brief) || {};
    const briefTokens = [briefB.city, briefB.locality, briefB.property_name, briefB.property_type,
                         AUD_STATE.clientele_type]
      .filter(Boolean).join(' ').toLowerCase().split(/[^a-z0-9]+/).filter(t => t.length > 3);
    const relevance = name => {
      const n = (name || '').toLowerCase();
      return briefTokens.some(t => n.includes(t));
    };
    const roleHint = m =>
      m.role === 'exclusion' ? '<span class="label-caps text-[9px] text-error ml-1">bad leads — suggest Exclude</span>'
      : m.role === 'lookalike' ? '<span class="label-caps text-[9px] text-ok ml-1">expansion — suggest Include</span>'
      : m.role === 'seed' ? '<span class="label-caps text-[9px] text-on-surface-variant ml-1">CRM seed</span>' : '';
    const matchChip = m => relevance(m.name)
      ? '<span class="label-caps text-[9px] text-primary ml-1">★ matches campaign</span>' : '';
    const bySuggested = (x, y) => (relevance(y.name) - relevance(x.name));
    const allMetaAudiences = (metaD.audiences || []).slice().sort(bySuggested);
    const metaAudiences = allMetaAudiences.filter(m => m.subtype !== 'LOOKALIKE');
    const lookalikeAudiences = allMetaAudiences.filter(m => m.subtype === 'LOOKALIKE');
    const lookalikeRegistry = {};
    (lookalikeD.audiences || []).forEach(r => { lookalikeRegistry[r.id] = r; });
    const lookalikeStale = lookalikeD.staleness || {};
    const includedIds = new Set((a.included_custom_audiences || []).map(x => x.id));
    const excludedIds  = new Set((a.excluded_custom_audiences  || []).map(x => x.id));
    let html = '<div class="grid md:grid-cols-2 gap-8">';
    html += '<div>' +
      '<div class="flex justify-between items-center mb-4">' +
        '<h2 class="font-headline text-2xl">Target parameters</h2>' +
        '<button id="save-aud-btn" onclick="saveAudience()" disabled class="border border-outline rounded label-caps px-4 py-2 hover:bg-surface-container-low transition-colors disabled:opacity-40 disabled:cursor-not-allowed">Save</button>' +
      '</div>' +
      '<div class="space-y-4">' +
      '<div id="aud-geo"></div>' +
      '<div class="grid grid-cols-2 gap-3">' +
        field('Age min', 'aud-agemin', a.age_min || 28, 'number') +
        field('Age max', 'aud-agemax', a.age_max || 65, 'number') +
      '</div>' +
      '<div id="aud-platform"></div>' +
      '<div id="aud-lists"></div>' +
      '<div class="mt-2 border border-outline-variant rounded p-3">' +
        '<div class="flex justify-between items-center">' +
          '<div><p class="label-caps text-outline">Improve targeting</p>' +
          '<p class="text-xs text-on-surface-variant">Keep what you have — get suggestions to add proven segments and drop irrelevant ones.</p></div>' +
          '<button onclick="loadRetargetSuggestions()" class="label-caps border border-primary text-primary px-3 py-1.5 hover:bg-primary hover:text-on-primary transition-colors whitespace-nowrap">Suggest changes</button>' +
        '</div>' +
        '<div id="aud-retarget" class="mt-3"></div>' +
      '</div>';
    if (metaAudiences.length) {
      html += '<div><p class="label-caps text-outline mb-2">Custom Meta audiences</p>' +
        '<div class="space-y-1 max-h-48 overflow-y-auto pr-1">';
      metaAudiences.forEach(m => {
        const cur = includedIds.has(m.id) ? 'include' : excludedIds.has(m.id) ? 'exclude' : '';
        const btnCls = (val, label, first) => {
          const base = 'aud-ma-btn text-[10px] label-caps px-2 py-0.5 transition-colors' + (first ? '' : ' border-l border-outline-variant');
          const active = cur === val;
          const accent = active && val === 'include' ? ' bg-primary text-on-primary'
                       : active && val === 'exclude' ? ' bg-error/20 text-error border-error'
                       : active ? ' bg-surface-container' : ' hover:bg-surface-container-low';
          return base + accent;
        };
        html += '<div class="flex items-center justify-between gap-2 text-sm py-1 border-b border-outline-variant/30">' +
          '<span class="truncate">' + esc(m.name) + ' <span class="label-caps text-outline text-[10px]">' + esc(m.subtype) + '</span>' +
            matchChip(m) + roleHint(m) + '</span>' +
          '<div class="aud-meta-audience inline-flex rounded border border-outline-variant overflow-hidden flex-shrink-0"' +
            ' data-id="' + esc(m.id) + '" data-name="' + esc(m.name) + '" data-val="' + esc(cur) + '">' +
            '<button class="' + btnCls('include', 'Include', true) + '" data-val="include" onclick="toggleMetaAud(this)">Include</button>' +
            '<button class="' + btnCls('exclude', 'Exclude', false) + '" data-val="exclude" onclick="toggleMetaAud(this)">Exclude</button>' +
            '<button class="' + btnCls('', 'None', false) + '" data-val="" onclick="toggleMetaAud(this)">None</button>' +
          '</div></div>';

    }
    if (lookalikeAudiences.length) {
      html += '<div class="mt-4"><p class="label-caps text-outline mb-2">Lookalike audiences</p>';
      if (lookalikeStale.stale) {
        html += '<p class="text-xs text-error mb-2">' + esc(lookalikeStale.reason || 'Seed may be stale.') + '</p>';
      }
      html += '<div class="space-y-1 max-h-48 overflow-y-auto pr-1">';
      lookalikeAudiences.forEach(m => {
        const cur = includedIds.has(m.id) ? 'include' : excludedIds.has(m.id) ? 'exclude' : '';
        const btnCls = (val, label, first) => {
          const base = 'aud-ma-btn text-[10px] label-caps px-2 py-0.5 transition-colors' + (first ? '' : ' border-l border-outline-variant');
          const active = cur === val;
          const accent = active && val === 'include' ? ' bg-primary text-on-primary'
                       : active && val === 'exclude' ? ' bg-error/20 text-error border-error'
                       : active ? ' bg-surface-container' : ' hover:bg-surface-container-low';
          return base + accent;
        };
        const reg = lookalikeRegistry[m.id];
        let metaLine = '';
        if (reg) {
          const built = reg.built_at ? new Date(reg.built_at).toLocaleDateString() : '';
          metaLine = '<p class="text-[10px] text-on-surface-variant">Built ' + esc(built) +
            (reg.seed_size ? ' · seed ' + reg.seed_size.toLocaleString() : '') +
            (lookalikeStale.stale ? ' · <span class="text-error">stale</span>' : '') + '</p>';
        }
        html += '<div class="py-1 border-b border-outline-variant/30">' +
          '<div class="flex items-center justify-between gap-2 text-sm">' +
          '<span class="truncate">' + esc(m.name) + matchChip(m) + roleHint(m) + '</span>' +
          '<div class="aud-meta-audience inline-flex rounded border border-outline-variant overflow-hidden flex-shrink-0"' +
            ' data-id="' + esc(m.id) + '" data-name="' + esc(m.name) + '" data-val="' + esc(cur) + '">' +
            '<button class="' + btnCls('include', 'Include', true) + '" data-val="include" onclick="toggleMetaAud(this)">Include</button>' +
            '<button class="' + btnCls('exclude', 'Exclude', false) + '" data-val="exclude" onclick="toggleMetaAud(this)">Exclude</button>' +
            '<button class="' + btnCls('', 'None', false) + '" data-val="" onclick="toggleMetaAud(this)">None</button>' +
          '</div></div>' + metaLine +
        '</div>';
      });
      html += '</div></div>';
    }
    const savedAudiences = (savedD.audiences || []).slice().sort(bySuggested);
    html += '<div class="mt-4"><p class="label-caps text-outline mb-2">Saved audiences (Meta targeting-spec)</p>' +
      '<p class="text-xs text-on-surface-variant mb-2">Reusable Meta Saved Audiences — click Apply to load one\'s full targeting (interests, ages, geo, platform) into this campaign\'s audience for review before publish.</p>';
    if (savedAudiences.length) {
      html += '<div class="space-y-1 max-h-32 overflow-y-auto pr-1 mb-2">';
      savedAudiences.forEach(m => {
        const isApplied = AUD_STATE.applied_saved_audience_id === m.id;
        html += '<div class="flex items-center justify-between gap-2 text-sm py-1 border-b border-outline-variant/30">' +
          '<span class="truncate">' + esc(m.name) + matchChip(m) + '</span>' +
          '<span class="flex items-center gap-2 flex-shrink-0">' +
            '<span class="label-caps text-outline text-[10px]">' + (m.approximate_count || 0).toLocaleString() + '</span>' +
            (isApplied
              ? '<span class="label-caps text-[10px] text-ok inline-flex items-center gap-1"><span class="material-symbols-outlined text-[13px]">check</span> Applied</span>' +
                '<button onclick="undoSavedAudience(this)" class="label-caps text-[10px] text-error border border-error/40 rounded px-2 py-0.5 hover:bg-error hover:text-on-error transition-colors">Undo</button>'
              : '<button onclick="applySavedAudience(\'' + esc(m.id) + '\', this)" ' +
                'class="label-caps text-[10px] border border-outline rounded px-2 py-0.5 hover:bg-primary hover:text-on-primary transition-colors">Apply</button>') +
          '</span>' +
        '</div>';
      });
      html += '</div>';
    }
    html += '<div class="flex gap-2">' +
      '<input id="saved-aud-name" type="text" placeholder="Name this targeting spec…" class="flex-1 border border-outline-variant rounded px-2 py-1.5 text-sm bg-transparent"/>' +
      '<button onclick="saveTargetAudience()" class="label-caps border border-outline rounded px-3 py-1.5 hover:bg-surface-container-low transition-colors whitespace-nowrap">Save as new</button>' +
    '</div></div>';
    html +=
      '<p class="text-sm text-on-surface-variant mt-2">' + esc(d.summary || '') + '</p>' +
      '</div></div>';
    const creativeMode = d.creative_mode || 'curated';
    html += '<div><h2 class="font-headline text-2xl mb-4">Deploy</h2>' +
      '<p class="text-sm text-on-surface-variant mb-4">Publishes the selected copy variants to Meta as PAUSED lead ads. Review in Ads Manager before activating.</p>' +
      '<div class="mb-4">' +
        '<p class="label-caps text-outline mb-2">Creative mode</p>' +
        '<div id="creative-mode-toggle" class="inline-flex rounded border border-outline-variant overflow-hidden" data-mode="' + esc(creativeMode) + '">' +
          '<button class="cm-btn text-xs label-caps px-3 py-2 transition-colors" data-val="curated" onclick="setCreativeMode(this)">Curated variants</button>' +
          '<button class="cm-btn text-xs label-caps px-3 py-2 transition-colors border-l border-outline-variant" data-val="dynamic" onclick="setCreativeMode(this)">Let Meta auto-select</button>' +
        '</div>' +
        '<p id="creative-mode-hint" class="text-xs text-on-surface-variant mt-2"></p>' +
      '</div>' +
      '<div class="grid grid-cols-2 gap-4 mb-4">' +
        '<div class="border-l-2 border-primary pl-4"><p class="label-caps text-outline">Budget</p><p class="font-headline text-2xl" id="dep-budget"></p></div>' +
        '<div class="border-l-2 border-primary pl-4"><p class="label-caps text-outline">Duration</p><p class="font-headline text-2xl" id="dep-dur"></p></div>' +
      '</div>' +
      '<button id="deploy-btn" onclick="deploy()" class="w-full bg-primary text-on-primary rounded label-caps py-4 hover:bg-surface-tint transition-colors disabled:opacity-60 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2">Publish campaign</button>' +
      '<div id="deploy-status" class="mt-4 text-sm"></div></div>';
    html += '</div>';
    root.innerHTML = html;
    renderAudGeo();
    renderAudPlatform();
    renderAudLists();
    loadGeoSuggestions();
    const b = (DETAIL && DETAIL.brief) || {};
    document.getElementById('dep-budget').textContent = fmtINR(b.daily_budget_inr) + '/day';
    document.getElementById('dep-dur').textContent = (b.campaign_duration_days || 30) + ' days';
    refreshCreativeModeUI();
    renderPublished();
  }).catch(e => { root.innerHTML = '<p class="text-error">' + e.message + '</p>'; });
}

/* ── Location: city-radius vs specific areas (neighbourhoods + pincodes) ──
   The 25km city circle sweeps in wasteland near the city, so the user can flip
   to "Specific areas only" and target exact neighbourhoods/pincodes instead.
   Picking any area auto-flips the mode. Each area carries city_key so downstream
   geo analysis maps it back to its city. ── */
function renderAudGeo() {
  const root = document.getElementById('aud-geo');
  if (!root || !AUD_STATE) return;
  const mode = AUD_STATE.geo_mode || 'radius';
  const modeBtn = (val, label) =>
    '<button type="button" onclick="setGeoMode(\'' + val + '\')" class="text-xs label-caps px-3 py-2 transition-colors' +
      (val === 'areas' ? ' border-l border-outline-variant' : '') +
      (mode === val ? ' bg-primary text-on-primary' : ' hover:bg-surface-container-low') + '">' + label + '</button>';
  let html = '<div class="flex justify-between items-center mb-2">' +
      '<label class="label-caps text-outline">Location — ' + esc(AUD_STATE.city || 'city') + '</label>' +
      '<div class="inline-flex rounded border border-outline-variant overflow-hidden">' +
        modeBtn('radius', 'City radius') + modeBtn('areas', 'Specific areas') +
      '</div>' +
    '</div>';
  if (mode === 'radius') {
    html += '<div><label class="text-xs text-on-surface-variant block mb-1">Radius around ' + esc(AUD_STATE.city || 'the city') + ' (km)</label>' +
      '<input id="aud-radius" type="number" value="' + esc(AUD_STATE.radius_km || 25) + '" min="17" max="80" oninput="AUD_STATE.radius_km=parseInt(this.value,10)||25; enableSaveAudience();" ' +
      'class="w-full border-0 border-b border-outline-variant bg-transparent py-2 focus:border-primary focus:ring-0"/>' +
      '<p class="text-xs text-on-surface-variant mt-1">Reaches everyone within this circle — simplest, but includes low-value areas on the city’s edge.</p></div>';
  } else {
    html += geoAreaEditor('Neighbourhoods', 'neighborhoods', 'neighborhood') +
            '<div class="mt-3">' + geoAreaEditor('Pincodes', 'zips', 'zip') + '</div>' +
            '<p class="text-xs text-on-surface-variant mt-2">Delivery is confined to exactly these areas — no city-edge wasteland.</p>';
  }
  root.innerHTML = html;
}
function geoAreaEditor(label, category, searchType) {
  const list = AUD_STATE[category] || [];
  const sugg = AUD_GEO_SUGGEST ? (AUD_GEO_SUGGEST[category] || []) : null;
  const chosen = new Set(list.map(x => x.key));
  let sHtml = '';
  if (sugg && sugg.length) {
    const avail = sugg.filter(s => !chosen.has(s.key)).slice(0, 12);
    if (avail.length) {
      sHtml = '<div class="mt-1.5"><p class="text-[10px] label-caps text-outline mb-1">Suggested for ' + esc(AUD_STATE.city || 'city') + '</p>' +
        '<div class="flex flex-wrap gap-1.5">' +
        avail.map(s => {
          const sLabel = s.area ? s.name + ' — ' + s.area : s.name;
          const sItem = Object.assign({}, s, { name: sLabel });
          return '<button type="button" onclick=\'addGeoArea("' + category + '",' + JSON.stringify(sItem).replace(/'/g, "&#39;") + ')\' ' +
            'class="text-xs border border-outline-variant rounded-full px-2.5 py-1 hover:bg-primary hover:text-on-primary transition-colors" title="' + esc(s.area || '') + '">+ ' + esc(sLabel) + '</button>';
        }).join('') +
        '</div></div>';
    }
  } else if (sugg === null) {
    sHtml = '<p class="text-[10px] text-on-surface-variant mt-1">Loading suggestions…</p>';
  }
  return '<div>' +
    '<p class="label-caps text-outline mb-1">' + label + ' (' + list.length + ')</p>' +
    '<div class="flex flex-wrap gap-2 mb-2">' +
      (list.map((it, i) => chip(it.name || it.key, "removeGeoArea('" + category + "'," + i + ")")).join('') || '<span class="text-sm text-on-surface-variant">None selected</span>') +
    '</div>' +
    '<div class="relative">' +
      '<input type="text" placeholder="Search to add ' + esc(label.toLowerCase()) + '…" oninput="geoSearchInput(this,\'' + category + '\',\'' + searchType + '\')" ' +
        'class="w-full text-sm border-0 border-b border-outline-variant bg-transparent py-1.5 focus:border-primary focus:ring-0"/>' +
      '<div class="aud-search-results absolute z-10 w-full bg-surface-container border border-outline-variant shadow-lg max-h-48 overflow-y-auto hidden"></div>' +
    '</div>' +
    sHtml +
  '</div>';
}
function setGeoMode(mode) {
  AUD_STATE.geo_mode = mode;
  enableSaveAudience();
  renderAudGeo();
}

/* ── Platform: restrict ad delivery to iOS only / Android only / all devices.
   Maps to Meta's targeting.user_os field (distinct from publisher_platforms,
   which controls FB/IG placement, not device OS). AutoOptimiser can surface a
   suggested default here (based on which platform's CPL is actually cheaper on
   this campaign) but never applies it — the user always picks. */
function renderAudPlatform() {
  const root = document.getElementById('aud-platform');
  if (!root || !AUD_STATE) return;
  const mode = AUD_STATE.platform_os || 'all';
  const opt = (val, label) =>
    '<button type="button" onclick="setPlatformOs(\'' + val + '\')" class="px-3 py-1.5 text-xs rounded label-caps border ' +
    (mode === val ? 'bg-primary text-on-primary border-primary' : 'border-outline-variant hover:bg-surface-container-low') +
    '">' + label + '</button>';
  root.innerHTML =
    '<div><label class="label-caps text-outline block mb-1">Devices</label>' +
    '<div class="flex gap-2">' + opt('all', 'All devices') + opt('ios', 'iOS only') + opt('android', 'Android only') + '</div>' +
    '</div>';
}
function setPlatformOs(mode) {
  AUD_STATE.platform_os = mode;
  enableSaveAudience();
  renderAudPlatform();
}
function addGeoArea(category, item) {
  if (!item || !item.key) return;
  if ((AUD_STATE[category] || []).some(x => x.key === item.key)) return;
  AUD_STATE[category].push({ key: item.key, name: item.name || item.key,
                             city_key: item.city_key || AUD_STATE.city_key || '' });
  AUD_STATE.geo_mode = 'areas';   // picking an area implies areas mode
  enableSaveAudience();
  renderAudGeo();
}
function removeGeoArea(category, idx) {
  AUD_STATE[category].splice(idx, 1);
  enableSaveAudience();
  renderAudGeo();
}
let GEO_SEARCH_TIMER = null;
function geoSearchInput(input, category, searchType) {
  const box = input.nextElementSibling;
  const q = input.value.trim();
  clearTimeout(GEO_SEARCH_TIMER);
  if (q.length < 2) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  GEO_SEARCH_TIMER = setTimeout(() => {
    const region = encodeURIComponent(AUD_STATE.region || '');
    api('/audience-search?type=' + searchType + '&q=' + encodeURIComponent(q) + '&region=' + region).then(d => {
      const results = (d.results || []).slice(0, 10);
      if (!results.length) { box.innerHTML = '<div class="px-3 py-2 text-sm text-on-surface-variant">No matches</div>'; box.classList.remove('hidden'); return; }
      box.innerHTML = results.map(r => {
        // Pincodes carry an `area` (locality names from India Post) — bake it into the
        // saved chip's name so "380015 — Nehru Nagar" survives into the audience list.
        const label = r.area ? r.name + ' — ' + r.area : r.name;
        const item = { key: r.key, name: label, city_key: AUD_STATE.city_key || '' };
        const sub = [r.area, r.region || r.primary_city].filter(Boolean).join(' · ');
        return '<button type="button" class="block w-full text-left px-3 py-2 text-sm hover:bg-surface-container-low" ' +
          'onclick=\'addGeoArea("' + category + '",' + JSON.stringify(item).replace(/'/g, "&#39;") + '); this.closest(".aud-search-results").classList.add("hidden"); this.closest(".relative").querySelector("input").value="";\'>' +
          esc(r.name) + (sub ? ' <span class="text-xs text-on-surface-variant">' + esc(sub) + '</span>' : '') + '</button>';
      }).join('');
      box.classList.remove('hidden');
    }).catch(() => {});
  }, 300);
}
function loadGeoSuggestions() {
  if (AUD_GEO_SUGGEST) { return; }
  api('/audience-geo-suggest/' + RUN_ID).then(d => {
    AUD_GEO_SUGGEST = { neighborhoods: d.neighborhoods || [], zips: d.zips || [] };
    if ((AUD_STATE.geo_mode || 'radius') === 'areas') renderAudGeo();
  }).catch(() => { AUD_GEO_SUGGEST = { neighborhoods: [], zips: [] }; });
}

/* ── Structured, editable targeting lists (interests/behaviours/job titles/
   income & company size/NRI geo/Advantage+) — all backed by AUD_STATE so
   Save sends the full picture instead of silently dropping anything the
   old UI didn't render. ── */
function chip(name, onRemove) {
  return '<span class="label-caps bg-primary-fixed/40 text-on-primary-container pl-3 pr-1.5 py-1 inline-flex items-center gap-1.5">' +
    esc(name) +
    '<button type="button" onclick="' + onRemove + '" class="text-on-primary-container/70 hover:text-error leading-none" aria-label="Remove">✕</button>' +
  '</span>';
}
function removeAudItem(category, idx) {
  AUD_STATE[category].splice(idx, 1);
  enableSaveAudience();
  renderAudLists();
}
function addAudItem(category, item) {
  if (!item || !item.name) return;
  const exists = AUD_STATE[category].some(x => (x.id && x.id === item.id) || x.name === item.name);
  if (exists) return;
  AUD_STATE[category].push(item);
  enableSaveAudience();
  renderAudLists();
}
function searchSection(label, category, searchType) {

    '<p class="label-caps text-outline mb-1">' + label + ' (' + list.length + ')</p>' +
    '<div class="flex flex-wrap gap-2 mb-2">' +
      (list.map((it, i) => chip(it.name || it, "removeAudItem('" + category + "'," + i + ")")).join('') || '<span class="text-sm text-on-surface-variant">None selected</span>') +
    '</div>' +
    '<div class="relative">' +
      '<input type="text" placeholder="Search to add…" oninput="audSearchInput(this,\'' + category + '\',\'' + searchType + '\')" ' +
        'class="w-full text-sm border-0 border-b border-outline-variant bg-transparent py-1.5 focus:border-primary focus:ring-0"/>' +
      '<div class="aud-search-results absolute z-10 w-full bg-surface-container border border-outline-variant shadow-lg max-h-48 overflow-y-auto hidden"></div>' +
    '</div>' +
  '</div>';
}
let AUD_SEARCH_TIMER = null;
function audSearchInput(input, category, searchType) {
  const box = input.nextElementSibling;
  const q = input.value.trim();
  clearTimeout(AUD_SEARCH_TIMER);
  if (q.length < 2) { box.classList.add('hidden'); box.innerHTML = ''; return; }

          'onclick="addAudItem(\'' + category + '\',{id:\'' + esc(r.id) + '\',name:\'' + esc(r.name).replace(/'/g, "\\'") + '\'}); this.closest(\'.aud-search-results\').classList.add(\'hidden\'); this.closest(\'.relative\').querySelector(\'input\').value=\'\';">' +

function workPositionSection() {

    options += '<optgroup label="' + esc(tier.replace(/_/g, ' ')) + '">' +
      opts.map(w => '<option value=\'' + JSON.stringify(w).replace(/'/g, "&#39;") + '\'>' + esc(w.name) + '</option>').join('') +
      '</optgroup>';
  });
  return '<div>' +
    '<p class="label-caps text-outline mb-1">Job titles (' + list.length + ')</p>' +

      (list.map((it, i) => chip(it.name, "removeAudItem('work_positions'," + i + ")")).join('') || '<span class="text-sm text-on-surface-variant">None selected</span>') +
    '</div>' +

function poolCheckbox(label, category, entry) {

    '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="if(this.checked){addAudItem(\'' + category + '\',' + JSON.stringify(entry).replace(/'/g, "&#39;").replace(/"/g, '&quot;') + ')}else{removeAudItem(\'' + category + '\',' + AUD_STATE[category].findIndex(x=>x.id===entry.id) + ')}" class="text-primary"/> ' +

    '<div class="mt-3 space-y-2">' +

    '</div></details>';

    city: AUD_STATE.city || '',

    income_clusters: AUD_STATE.income_clusters,
    industries: AUD_STATE.industries,

    nri_countries: nri,

    clientele_type: AUD_STATE.clientele_type,

function renderOptimise() {

  const root = document.getElementById('tab-optimise');
  if (!DETAIL || !DETAIL.has_live_ads) {
    root.innerHTML = '<p class="text-on-surface-variant">Publish live ads first to see performance, recommendations, and variant comparisons.</p>';
    loadStrategicInsights(root);
    loadMetaRecommendations(root);
    return;
  }
  const skRow = '<div class="h-3 bg-surface-container rounded animate-pulse w-full mb-2"></div>';
  root.innerHTML = '<h2 class="font-headline text-2xl mb-4 text-on-surface-variant">Performance at a glance</h2>' +
    '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">' +
    [0,1,2,3].map(() => '<div class="border border-outline-variant p-4">' + skRow + '<div class="h-8 bg-surface-container rounded animate-pulse w-3/4 mt-3"></div></div>').join('') +
    '</div>' +
    '<div class="space-y-3">' + [0,1,2].map(() => '<div class="border border-outline-variant p-4">' + skRow + '<div class="h-3 bg-surface-container rounded animate-pulse w-2/3"></div></div>').join('') + '</div>';
  api('/meta-performance/' + RUN_ID).then(d => {
    let html = '<h2 class="font-headline text-2xl mb-4">Performance at a glance</h2>';
    const tot = (d.variants || []).reduce((a, v) => {
      const m = v.metrics || {};
      a.impr += m.impressions || 0; a.clicks += Math.round((m.impressions || 0) * (m.ctr || 0) / 100);
      a.leads += m.leads || 0; a.spend += m.spend || 0; return a;
    }, { impr: 0, clicks: 0, leads: 0, spend: 0 });
    const cpl = tot.leads ? tot.spend / tot.leads : 0;
    html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">' +
      stat('Impressions', fmtCount(tot.impr)) + stat('Clicks', fmtCount(tot.clicks)) +
      stat('Leads', tot.leads) + stat('CPL', fmtINR(cpl)) + '</div>';
    // Recommendations (campaign + per-variant)
    const allRecs = (d.campaign_recs || []).concat(...(d.variants || []).map(v => (v.recommendations || []).map(r => ({ ...r, variant: v.variant }))));
    OPTIMISE_RECS = allRecs.slice();
    html += '<h3 class="font-headline text-xl mb-3">AI recommendations</h3>';
    if (!allRecs.length) html += '<p class="text-sm text-on-surface-variant mb-6">No recommendations yet — let the ads gather more data.</p>';
    else { html += '<div class="space-y-3 mb-8">'; allRecs.forEach((r, i) => {
      const col = r.severity === 'red' ? 'text-error' : r.severity === 'green' ? 'text-ok' : 'text-warn';
      html += '<div id="rec-row-' + i + '" class="border border-outline-variant p-4 flex justify-between items-center gap-4">' +
        '<div><p class="label-caps ' + col + '">' + esc(r.label) + '</p><p class="text-sm text-on-surface-variant mt-1">' + esc(r.detail) + '</p></div>' +
        '<button onclick="applyRecAt(this, ' + i + ')" class="label-caps border border-primary text-primary px-4 py-2 hover:bg-primary hover:text-on-primary whitespace-nowrap disabled:opacity-60 disabled:cursor-not-allowed">Apply</button>' +
        '</div>';
    }); html += '</div>'; }
    // Per-variant performance
    html += '<h3 class="font-headline text-xl mb-3">Creative variant performance</h3><div class="space-y-2 mb-8">';
    (d.variants || []).forEach(v => {
      const m = v.metrics || {};
      const rank = v.rank_label ? '<span class="label-caps ' + (v.rank_label === 'Top performer' ? 'text-ok' : 'text-error') + '">' + v.rank_label + '</span>' : '';
      html += '<div class="border border-outline-variant p-4 flex justify-between items-center">' +
        '<div><p class="font-headline text-lg">Version ' + v.variant + ' ' + rank + '</p>' +
        '<p class="text-sm text-outline">CTR ' + (m.ctr || 0) + '% · ' + (m.leads || 0) + ' leads · CPL ' + fmtINR(m.cpl) + '</p></div>' +
        '<p class="font-display text-xl">' + fmtCount(m.impressions || 0) + '</p></div>';
    });
    html += '</div>';
    root.innerHTML = html;
    loadStrategicInsights(root);
    loadMetaRecommendations(root);
  }).catch(e => { root.innerHTML = '<p class="text-error">' + e.message + '</p>'; });
}
function stat(label, val) {
  return '<div class="border border-outline-variant p-4"><p class="label-caps text-outline">' + label + '</p><p class="font-display text-3xl mt-1">' + val + '</p></div>';
}
function applyRecAt(btn, idx) {
  const r = OPTIMISE_RECS[idx];
  if (!r) { showError('Recommendation is out of date — refresh and try again.'); return; }
  let action = r.action, params = r.params || {};
  if (action === 'note') { showError(r.detail); return; }
  if (action === 'targeting_interests') { action = 'add_interests'; }
  // variant=0 means all live variants; fall back to first variant for legacy callers
  const variant = (r.variant !== undefined) ? r.variant
    : (r.apply_to_variant || (DETAIL.variants[0] && DETAIL.variants[0].variant) || 1);
  const spin = '<span class="inline-block w-3 h-3 border-2 border-primary border-t-transparent rounded-full animate-spin"></span>';
  const origHtml = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.innerHTML = spin + ' Applying…'; }
  api('/meta-optimize/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, variant, params }) })
    .then(() => {
      const row = document.getElementById('rec-row-' + idx);
      if (row) row.insertAdjacentHTML('beforeend', '<span class="label-caps text-ok whitespace-nowrap">✓ Applied</span>');
      if (btn) btn.remove();
      toast('Applied');
      loaded.optimise = false;
      renderOptimise();
    })
    .catch(e => {
      if (btn) { btn.disabled = false; btn.innerHTML = origHtml; }
      showError(e.message);
    });
}
function loadStrategicInsights(root) {
  const loaderId = 'si-loader-' + Math.random().toString(36).slice(2);
  root.insertAdjacentHTML('beforeend',
    '<div id="' + loaderId + '" class="mt-4 flex items-center gap-2 text-on-surface-variant text-sm">' +
    '<span class="inline-block w-3 h-3 border-2 border-primary border-t-transparent rounded-full animate-spin flex-shrink-0"></span>' +
    'Loading CRM insights…</div>');
  api('/crm-strategic-insights?run_id=' + RUN_ID).then(d => {
    const el = document.getElementById(loaderId);
    const camp = (d.insights || []).filter(i => i.scope === 'campaign');
    if (!camp.length) { if (el) el.remove(); return; }
    let html = '<h3 class="font-headline text-xl mb-3 mt-4">Strategic insights (from your CRM)</h3><div class="space-y-3">';
    camp.forEach(i => {
      const rec = { action: i.category === 'budget' ? 'budget' : 'add_interests', variant: 0, params: i.params || {} };
      const idx = OPTIMISE_RECS.push(rec) - 1;
      html += '<div id="rec-row-' + idx + '" class="border border-outline-variant p-4 flex justify-between items-center gap-4">' +
        '<div><p class="label-caps text-primary">' + esc(i.title) + '</p>' +
        '<p class="text-sm mt-1">' + esc(i.finding) + '</p><p class="text-sm text-on-surface-variant mt-1">' + esc(i.action) + '</p></div>' +
        '<button onclick="applyRecAt(this, ' + idx + ')" class="label-caps border border-primary text-primary px-4 py-2 hover:bg-primary hover:text-on-primary whitespace-nowrap disabled:opacity-60 disabled:cursor-not-allowed">Apply to all</button></div>';
    });
    html += '</div>';
    if (el) { el.outerHTML = html; } else { root.insertAdjacentHTML('beforeend', html); }
  }).catch(() => { const el = document.getElementById(loaderId); if (el) el.remove(); });
}

function loadMetaRecommendations(root) {
  if (!DETAIL || !DETAIL.has_live_ads) return;
  api('/meta-recommendations/' + RUN_ID).then(d => {
    const recs = d.recommendations || [];
    if (!recs.length) return;
    let html = '<h3 class="font-headline text-xl mb-3 mt-8">Meta native recommendations</h3><div class="space-y-3">';
    recs.forEach(r => {
      const title = esc(r.title || r.type || 'Recommendation');
      const detail = esc(r.message || r.content || '');
      html += '<div class="border border-outline-variant p-4 flex justify-between items-center gap-4">' +
        '<div><p class="label-caps text-primary">' + title + '</p>' +
        (detail ? '<p class="text-sm text-on-surface-variant mt-1">' + detail + '</p>' : '') + '</div>';
      if (r.recommendation_id) {
        html += '<button onclick="applyMetaRec(this, \'' + esc(r.recommendation_id) + '\')" class="label-caps border border-primary text-primary px-4 py-2 hover:bg-primary hover:text-on-primary whitespace-nowrap disabled:opacity-60 disabled:cursor-not-allowed">Apply</button>';
      }
      html += '</div>';
    });
    html += '</div>';
    root.insertAdjacentHTML('beforeend', html);
  }).catch(() => {});
}
function applyMetaRec(btn, id) {
  const spin = '<span class="inline-block w-3 h-3 border-2 border-primary border-t-transparent rounded-full animate-spin"></span>';
  const origHtml = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.innerHTML = spin + ' Applying…'; }
  api('/meta-apply-recommendation/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ recommendation_id: id }) })
    .then(() => { toast('Recommendation applied'); if (btn) { btn.disabled = true; btn.textContent = '✓ Applied'; } })
    .catch(e => {
      if (btn) { btn.disabled = false; btn.innerHTML = origHtml; }
      showError(e.message);
    });
}

/* ── Approve ── */
function approveCampaign() {
  const btn = document.getElementById('approve-btn');
  const spin = '<span class="inline-block w-3.5 h-3.5 border-2 border-on-primary border-t-transparent rounded-full animate-spin"></span>';
  if (btn) { btn.disabled = true; btn.innerHTML = spin + ' Approving…'; }
  api('/approve/' + RUN_ID, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ selected_variants: [...selected] }) })
    .then(() => {
      document.getElementById('approve-state').innerHTML = '<span class="label-caps text-ok">✓ Approved</span>';
      toast('Approved');
      if (btn) { btn.disabled = false; btn.textContent = 'Approve selected'; }
    })
    .catch(e => {
      if (btn) { btn.disabled = false; btn.textContent = 'Approve selected'; }
      showError(e.message);
    });
}

/* ── Error banner ── */
let errTimer = null;
function showError(msg) {
  let el = document.getElementById('err-banner');
  if (!el) {
    el = document.createElement('div');
    el.id = 'err-banner';
    el.className = 'fixed top-4 right-4 z-50 max-w-sm bg-error text-on-error px-4 py-3 label-caps text-[11px] flex items-start gap-3 shadow-lg rounded transition-opacity';
    el.innerHTML = '<span class="material-symbols-outlined text-[16px] shrink-0">error</span><span class="flex-1" id="err-banner-msg"></span>' +
      '<button onclick="document.getElementById(\'err-banner\').style.opacity=\'0\'" class="opacity-70 hover:opacity-100 ml-1 shrink-0">✕</button>';
    document.body.appendChild(el);
  }
  document.getElementById('err-banner-msg').textContent = msg;
  el.style.opacity = '1';
  clearTimeout(errTimer);
  errTimer = setTimeout(() => { el.style.opacity = '0'; }, 7000);
}

/* ── Toast ── */
let toastTimer = null;
function toast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast';
    t.className = 'fixed bottom-6 right-6 bg-primary text-on-primary px-4 py-2 label-caps z-50 transition-opacity'; document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.style.opacity = '0', 2000);
}

/* ── Boot ── */
loadDetail().then(() => { renderVisuals(); showTab('copy'); }).catch(e => {
  document.getElementById('d-title').textContent = 'Could not load campaign';
  document.getElementById('d-sub').textContent = e.message;
});

</script>
{% endblock %}
