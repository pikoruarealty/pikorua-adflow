<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Request access — PIKORUA AdFlow</title>
<link rel="icon" type="image/png" href="/favicon.ico"/>
<script>(function(){try{if(localStorage.getItem('pikorua-theme')==='dark')document.documentElement.classList.add('dark');}catch(e){}})();</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: "class" };</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="/static/app.js" defer></script>
<style>
body{font-family:Inter,sans-serif;} .font-display{font-family:'Playfair Display',serif;}
button, input { border-radius: 0; appearance: none; -webkit-appearance: none; }
.material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal;
  font-size: 22px; display: inline-block; line-height: 1; white-space: nowrap; word-wrap: normal; direction: ltr;
  -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#faf9f7] dark:bg-[#141310] transition-colors">
  <button onclick="pikToggleTheme()" title="Toggle light / dark" class="fixed top-4 right-4 text-gray-500 dark:text-gray-400 hover:text-[#775a19] dark:hover:text-[#e9c176] hover:bg-black/5 dark:hover:bg-white/5 p-2 transition-colors">
    <span class="material-symbols-outlined">contrast</span>
  </button>
  <div class="w-full max-w-sm px-6">
    <div class="text-center mb-8">
      <img src="/logo/light" alt="PIKORUA" class="h-32 w-64 mx-auto object-contain dark:hidden"
           onerror="this.outerHTML='&lt;span class=\'font-display text-3xl\'&gt;PIKORUA&lt;/span&gt;'"/>
      <img src="/logo/dark" alt="PIKORUA" class="h-32 w-64 mx-auto object-contain hidden dark:block"
           onerror="this.outerHTML='&lt;span class=\'font-display text-3xl\'&gt;PIKORUA&lt;/span&gt;'"/>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">AdFlow Portal — request access</p>
    </div>

    {% if registered %}
    <div class="text-center space-y-4">
      <div class="text-sm text-green-800 bg-green-50 border border-green-200 dark:text-green-300 dark:bg-green-950/40 dark:border-green-800 px-3 py-3">
        Your account request was submitted. An admin needs to approve it before you can sign in.
      </div>
      <a href="/login" class="inline-block w-full bg-[#775a19] text-white py-2 font-medium hover:bg-[#5f4714] transition-colors">
        Back to sign in
      </a>
    </div>
    {% else %}
    <form method="post" action="/register" class="space-y-4">
      {% if error %}
      <div class="text-sm text-red-700 bg-red-50 border border-red-200 dark:text-red-300 dark:bg-red-950/40 dark:border-red-800 px-3 py-2">{{ error }}</div>
      {% endif %}
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1" for="username">Username</label>
        <input id="username" name="username" type="text" autofocus required value="{{ username or '' }}"
               class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1f211f] text-gray-900 dark:text-gray-100 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#775a19] dark:focus:ring-[#e9c176]"/>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1" for="password">Password</label>
        <div class="relative">
          <input id="password" name="password" type="password" required
                 class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1f211f] text-gray-900 dark:text-gray-100 pl-3 pr-10 py-2 focus:outline-none focus:ring-2 focus:ring-[#775a19] dark:focus:ring-[#e9c176]"/>
          <button type="button" onclick="pikToggleShowPassword('password', this)" tabindex="-1"
                  class="absolute inset-y-0 right-0 flex items-center px-2.5 text-gray-500 dark:text-gray-400 hover:text-[#775a19] dark:hover:text-[#e9c176]">
            <span class="material-symbols-outlined text-[20px]">visibility</span>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1" for="confirm_password">Confirm password</label>
        <div class="relative">
          <input id="confirm_password" name="confirm_password" type="password" required
                 class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1f211f] text-gray-900 dark:text-gray-100 pl-3 pr-10 py-2 focus:outline-none focus:ring-2 focus:ring-[#775a19] dark:focus:ring-[#e9c176]"/>
          <button type="button" onclick="pikToggleShowPassword('confirm_password', this)" tabindex="-1"
                  class="absolute inset-y-0 right-0 flex items-center px-2.5 text-gray-500 dark:text-gray-400 hover:text-[#775a19] dark:hover:text-[#e9c176]">
            <span class="material-symbols-outlined text-[20px]">visibility</span>
          </button>
        </div>
      </div>
      <button type="submit" class="w-full bg-[#775a19] text-white py-2 font-medium hover:bg-[#5f4714] transition-colors">
        Request access
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-4">
      Already have an account? <a href="/login" class="text-[#775a19] dark:text-[#e9c176] font-medium hover:underline">Sign in</a>
    </p>
    {% endif %}
  </div>
</body>
</html>
