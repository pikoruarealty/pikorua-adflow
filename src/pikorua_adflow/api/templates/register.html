<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Request access — PIKORUA AdFlow</title>
<link rel="icon" type="image/png" href="/favicon.ico"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>body{font-family:Inter,sans-serif;} .font-display{font-family:'Playfair Display',serif;}</style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#faf9f7]">
  <div class="w-full max-w-sm px-6">
    <div class="text-center mb-8">
      <img src="/logo/light" alt="PIKORUA" class="h-10 w-auto mx-auto"
           onerror="this.outerHTML='&lt;span class=\'font-display text-3xl\'&gt;PIKORUA&lt;/span&gt;'"/>
      <p class="text-sm text-gray-500 mt-2">AdFlow Portal — request access</p>
    </div>

    {% if registered %}
    <div class="text-center space-y-4">
      <div class="text-sm text-green-800 bg-green-50 border border-green-200 rounded px-3 py-3">
        Your account request was submitted. An admin needs to approve it before you can sign in.
      </div>
      <a href="/login" class="inline-block w-full bg-[#775a19] text-white rounded py-2 font-medium hover:bg-[#5f4714] transition-colors">
        Back to sign in
      </a>
    </div>
    {% else %}
    <form method="post" action="/register" class="space-y-4">
      {% if error %}
      <div class="text-sm text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2">{{ error }}</div>
      {% endif %}
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1" for="username">Username</label>
        <input id="username" name="username" type="text" autofocus required value="{{ username or '' }}"
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#775a19]"/>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#775a19]"/>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1" for="confirm_password">Confirm password</label>
        <input id="confirm_password" name="confirm_password" type="password" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#775a19]"/>
      </div>
      <button type="submit" class="w-full bg-[#775a19] text-white rounded py-2 font-medium hover:bg-[#5f4714] transition-colors">
        Request access
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
      Already have an account? <a href="/login" class="text-[#775a19] font-medium hover:underline">Sign in</a>
    </p>
    {% endif %}
  </div>
</body>
</html>
