research_persona:
  description: >
    Research and build a detailed buyer persona for a {property_type} priced at ₹{price_cr} Cr
    in {city}.

    The persona must include:
    - Age range and life stage
    - Income / net worth bracket
    - Primary motivation for buying (investment, lifestyle, legacy, NRI reconnection, etc.)
    - Top 2 pain points or fears in the buying process
    - Preferred communication channels (WhatsApp, email, Instagram, etc.)
    - Decision-making style (impulse vs. considered, solo vs. family committee)
    - The one thing that would make them trust a real estate consultancy

    Base your persona on real market patterns for luxury buyers in {city}, not assumptions.
    If you cannot find specific data for {city}, note the gap explicitly.
  expected_output: >
    A structured JSON object with keys: age_range, net_worth, primary_motivation,
    pain_points (list of 2), preferred_channels (list), decision_style, trust_trigger.
    Save to outputs/persona.json.
  agent: persona_researcher
  output_file: outputs/persona.json

scout_competitors:
  description: >
    Search for luxury real estate ads and campaigns currently running in {city}.
    Check Meta Ad Library (search: "luxury apartments {city}", "premium villa {city}",
    "real estate {city}") and Google (site:housing.com OR 99acres.com luxury {city}).

    For each competitor found, note:
    - Brand name (if visible)
    - Headline / main message
    - Emotional angle used (aspiration, fear of missing out, investment return, lifestyle, etc.)
    - CTA used

    If no competitors are found, state this explicitly — do not invent data.
  expected_output: >
    A markdown report with 3–5 competitor ad summaries, each covering brand, headline,
    angle, and CTA. Ends with a "Gap Analysis" section: what angle is no one using
    that Pikorua could own?
    Save to outputs/competitor_report.md.
  agent: competitor_scout
  output_file: outputs/competitor_report.md

analyse_crm_leads:
  description: >
    You have been given a CRM intelligence report from Pikorua's past leads.
    Read it carefully and extract 3–5 specific signals the campaign team should act on.

    CRM data:
    {crm_insights}

    Your job:
    - Identify which ad angles or lead sources have historically produced the best-quality leads
      (leads that progressed to site visit or negotiation, not just first contact)
    - Identify which buyer profile (budget bracket, buyer type, city) converts deepest in the funnel
    - Flag any angles or audiences that consistently produce dead/lost leads — avoid repeating them
    - Produce a concise "CRM Signal" summary: 3–5 bullet points, each a specific, actionable insight

    If the CRM data says "No CRM data available", output:
    "No historical lead data available — proceeding with market research only."
    Do not fabricate insights when data is absent.
  expected_output: >
    A markdown section titled "## CRM Signal" with 3–5 bullet points.
    Each bullet is one specific, actionable insight grounded in the CRM data.
    Every number you cite must come from the CRM data above — do not invent figures to
    match the example's shape.

    The example below shows the FORMAT and specificity to aim for. Its numbers are
    placeholders for illustration only — never copy them into your output:
    ## CRM Signal
    - [Angle] produced the highest funnel depth (cite the actual figure) — lead with this in new creative.
    - [Which buyer profile] progresses furthest; [which] stalls at first contact — per the data.
    - [Which budget bracket] reaches site visit most often — state the real comparison from the data.
    Save to outputs/crm_signal.md.
  agent: targeting_researcher
  output_file: outputs/crm_signal.md

build_targeting_brief:
  description: >
    Build a complete geo, demographic, and professional targeting brief for a
    {property_type} priced at ₹{price_cr} Cr in {city}.

    PART 1 — GEO TARGETING:
    Search for the pincode of the property locality ({locality} if provided, otherwise
    the main luxury belt of {city}). Then find 8–12 nearby pincodes covering:
    - Adjacent affluent residential localities
    - Areas where the target buyer demographic (HNI, NRI) is known to live or work
    - Nearby commercial/business hubs where HNIs work (offices, SEZs, business parks)
    Do not invent pincodes. Search for them and list only verified ones.
    Format: locality name — pincode

    PART 2 — DEMOGRAPHIC TARGETING:
    Based on the price tier (₹{price_cr} Cr) and property type ({property_type}), specify:
    - Age range (e.g. 35–55)
    - Household income bracket (in INR annual, e.g. ₹50L+)
    - Gender targeting recommendation (all / skew male / skew female — with reasoning)
    - NRI segment: yes/no and which diaspora geographies to target (UAE, US, UK, etc.)

    PART 3 — PROFESSIONAL TARGETING:
    Identify the specific job titles, industries, and seniority levels that represent
    likely buyers at this price point. Be specific — not "business owners" but:
    - C-suite: CEOs, MDs, CMOs, CFOs, COOs of mid-to-large companies
    - Founders/promoters of manufacturing, pharma, textile, real estate, FMCG companies
    - Senior professionals: VPs, Directors, Partners at law firms / CA firms / investment banks
    - NRI professionals: IT directors/VPs in US/UK, finance professionals in UAE/Singapore
    - Entrepreneurs with exits or active businesses valued ₹20 Cr+
    List these as targetable segments on LinkedIn (for NRI/professional targeting)
    and as Meta interest/employer categories where available.

    PART 4 — META ADS TARGETING SEGMENTS:
    List specific interest and behavioural targeting segments available on Meta Ads:
    - Interests: luxury real estate, property investment, interior design, golf,
      business class travel, wealth management, premium automobiles
    - Behaviours: frequent international travellers, business owners, high-value purchases
    - Employer/industry targeting if relevant
    - Note: special_ad_category HOUSING restricts age/gender/radius — flag any restrictions

    PART 5 — GOOGLE ADS TARGETING:
    List:
    - 10–15 specific search keywords (exact and phrase match) the buyer would use
    - 5 negative keywords to exclude irrelevant traffic (e.g. "cheap", "under 1 crore")
    - In-market audience segments relevant for Google Ads
    - Recommended bidding strategy for the campaign goal: {goal}

    NEVER INVENT: All pincodes must be searched and verified. Flag any you could not confirm.
  expected_output: >
    A structured markdown document with 5 clearly labelled sections:
    1. Geo Targeting — table of locality + pincode (verified, flag unconfirmed)
    2. Demographics — age, income, gender, NRI segments
    3. Professional Targeting — job titles, industries, seniority, platforms
    4. Meta Ads Segments — interests, behaviours, restrictions
    5. Google Ads — keywords, negatives, in-market audiences, bidding strategy
    Save to outputs/targeting_brief.md.
  agent: targeting_researcher
  output_file: outputs/targeting_brief.md

select_targeting:
  description: >
    Choose the actual Meta ad-set targeting for a {property_type} priced at
    ₹{price_cr} Cr in {city}{locality_suffix}, for buyer type {buyer_type}
    (goal: {goal}). 100% cheque payment only (no cash component accepted): {cheque_only}.

    You must choose ONLY from the candidate pool below — every name in it is
    verified to exist on Meta. Do not invent, rephrase, or abbreviate a name;
    copy it exactly as listed, or it will be discarded.

    {targeting_pool}

    IMPORTANT — property type does NOT reveal buyer purpose or profession.
    A bungalow, villa, or apartment can be bought by an owner-occupier, an
    investor, a trader, or a corporate professional — the property itself
    tells you almost nothing about which. Do not guess a buyer persona from
    property_type/price alone.

    The one real signal for who actually buys is CRM history — what past
    leads for this account looked like:

    {crm_insights}

    - If the CRM signal above names specific profiles, industries, or budget
      brackets that convert (or that go dead), let that drive your picks —
      e.g. lean into the industries/interests that match converting profiles,
      and avoid stacking interests/positions that match profiles CRM shows as
      historically dead leads.
    - If the CRM signal is thin or says no historical data is available,
      do NOT invent a confident persona. Instead select a moderately broad,
      balanced mix across property_investment and luxury_lifestyle interest
      tags (buyers are unknown, so don't over-narrow on a guess), while still
      obeying the work-position and count caps below.

    Hard rules, backed by this account's own live performance data:
    - Prefer 1-2 "owner_tier" work positions over stacking many "csuite_tier"
      titles — on this account, narrow owner-tier targeting has produced
      ₹112-187 CPL, while broad C-suite stacks (5+ titles) produced ₹384-557
      CPL on otherwise-similar audiences. Only reach for csuite_tier/it_tier/
      specialist_tier positions when CRM signal actually names that
      profession among converting leads — never infer it from property type.
    - Pick 6-10 interests, not the whole pool — a focused set outperforms an
      exhaustive one.
    - Pick at most 3-4 behaviours; include an nri_diaspora/expat behaviour only
      if buyer_type or nri_geographies indicates an NRI audience.
    - Set age_min/age_max from CRM signal if it indicates an age skew;
      otherwise use a standard HNI/NRI luxury-buyer range rather than
      guessing from property type.
    - relationship_statuses is optional. Include "Married" only when the buyer
      profile skews to families/end-users (most luxury homes do); leave it empty
      for pure-investor or younger audiences. Choose only from the RELATIONSHIP
      STATUS names in the pool, verbatim.
    - If cheque_only is "yes", this property only accepts declared/legitimate
      income buyers (no cash component) — lean into the pool's cheque-only note
      (CEO/CFO, Merchant Navy, Government Employee, Pharmaceutical sciences,
      IT Director/CIO, Export/International business) alongside whatever CRM
      signal indicates, still respecting the owner/csuite caps above.
  expected_output: >
    A single JSON object, nothing else, with keys:
    interests (list of strings, each copied verbatim from the pool),
    behaviours (list of strings, verbatim from the pool),
    work_positions (list of strings, verbatim from the pool),
    relationship_statuses (list of strings from the pool, may be empty),
    age_min (integer), age_max (integer),
    reasoning (1-3 sentences: what CRM signal drove these picks, or — if CRM
    data was thin/absent — a note that this is a balanced default mix rather
    than a persona-specific one).
    Save to outputs/targeting_selection.json.
  agent: targeting_researcher
  output_file: outputs/targeting_selection.json

analyse_trends:
  description: >
    Today's date is {today}. Search for real estate demand signals, policy changes,
    or news events in {city} that are current and relevant to luxury property buyers
    right now — in mid-2026.

    Look for:
    - Infrastructure announcements (metro, airport, expressway)
    - RBI interest rate moves and their effect on HNI buyers
    - NRI remittance or FEMA/RERA policy changes
    - Any recent news about the {city} luxury property market

    IMPORTANT — staleness filter:
    - Discard any insight where the predicted event or milestone was dated 2025 or earlier
      and has already occurred or clearly did not materialise.
    - Only include trends that are genuinely relevant and actionable in {today}.
    - If a source says "expected by 2025" and it is now {today}, that insight is stale —
      do not include it. Find something more recent.

    Produce 3 trend hooks — each a one-line insight that could anchor a campaign angle.
    Each hook must come from a real search result you can cite. The following only shows
    the one-line shape — do not reuse its claim unless your own search actually supports it:
    "[City] [segment] inventory at multi-year low — urgency angle is credible (source)."
  expected_output: >
    3 trend hooks, each as a headline-style insight (1–2 sentences) with a source or
    search result cited. Each hook must be relevant as of {today} — no stale predictions.
    If no current trends are found, say so explicitly — do not fabricate signals.
    Save to outputs/trend_hooks.md.
  agent: trend_analyst
  output_file: outputs/trend_hooks.md
