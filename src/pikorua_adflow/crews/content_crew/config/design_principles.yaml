# Distilled luxury-ad design grammar. Consumed by image_service.py -> build_ad_prompt().
# Field values are concise INSTRUCTIONS (≤15 words each) — not descriptions.
# Verbose prose confuses image models into ignoring explicit text callouts.
#
# layout_type     → AD_STRUCTURES / vocabulary_additions.structures key
# footer_backing  → exact hex for solid panel colour
# text_primary_hex → exact hex for primary display text
# lighting        → concrete light direction + quality (≤15 words)
# subject_rule    → concrete placement instruction (≤15 words)
# negative_space_rule → where text lives in frame (≤15 words)
# type_treatment  → concrete typeface behaviour (≤15 words)
# info_band_style → how the bottom info section is laid out — PART OF the design bundle,
#                   so the bottom layout changes whenever the recipe changes. One of:
#                   column_footer | icon_grid_strip | price_hero_strip |
#                   asymmetric_band | compact_spec_row | strip_three_col
# NOT INCLUDED: why_it_works, palette_family — prose that confuses image models.

recipes:
  - name: the_open_room_anchor
    scene_types: [lifestyle_single, lifestyle_social]
    tones: [dark_luxury, bright_aspirational]
    text_tier: full_detail
    text_roles: [headline, subhead, price, info_band, badge, cta]
    info_band_style: compact_spec_row
    layout_type: full-bleed
    text_primary_hex: "#C9A84C"
    lighting: "bright open diffused light from a large window or floor-to-ceiling glazing — the room must feel airy and spacious; outdoor scenery (trees, sky) visible or implied through glass; natural dark floor zone must exist to anchor the location name"
    subject_rule: "candid natural moment — figure at ease in the space, facing away or in profile; scene remains architecturally dominant; person never fills or blocks the natural dark floor zone"
    negative_space_rule: "headline in a compact floating pill upper-left; location name LARGE in the natural dark lower-photo zone (floor plane, shadow pool) just above the spec strip; photo fills 85%+ of frame"
    type_treatment: "conversational mixed-case serif headline in the pill card; location name HEAVY gold serif in dark floor zone; gold tracked geometric sans for spec row"

  - name: the_horizon_anchor
    scene_types: [lifestyle_social, interior]
    tones: [dark_luxury, bright_aspirational]
    text_tier: full_detail
    text_roles: [headline, subhead, info_band, price, cta, badge]
    info_band_style: icon_grid_strip
    layout_type: solid_footer_container
    footer_backing: "#0D1B2A"
    text_primary_hex: "#C9A84C"
    lighting: "twilight blue hour, strong horizon line, warm balcony light vs cool sky"
    subject_rule: "seated or standing above the footer cut-off line, gazing outward"
    negative_space_rule: "LOCATION NAME large in the photo zone (upper or mid area) — this is non-negotiable and is the primary text event; campaign headline at the photo/footer threshold; lower 18-20% = narrow solid footer strip for secondary spec info ONLY; never put the location name exclusively in the footer"
    type_treatment: "HEAVY serif location name dominant in photo zone; bold italic headline at photo/footer boundary; tight tracked geometric sans for the footer spec row"

  - name: the_sky_chandelier
    scene_types: [exterior, lifestyle_single]
    tones: [dark_luxury, bright_aspirational]
    text_tier: full_detail
    text_roles: [headline, subhead, price, info_band, cta, badge]
    info_band_style: price_hero_strip
    layout_type: full-bleed
    text_primary_hex: "#C9A84C"
    lighting: "blue hour or deep twilight preferred — dark upper sky with indigo/deep purple tones, warm interior lights glowing from units below; avoid plain golden hour unless the scene specifically calls for it"
    subject_rule: "distant human scale reference only, gazing toward the light source"
    negative_space_rule: "upper sky or dark ceiling reserved for headline lockup only"
    type_treatment: "centered serif lockup at top, bold weight, gold, all-caps"

  - name: the_glass_morphism_shield
    scene_types: [interior, lifestyle_social]
    tones: [bright_aspirational]
    text_tier: full_detail
    text_roles: [headline, subhead, price, info_band, badge, cta]
    info_band_style: compact_spec_row
    layout_type: glass_morphism_panel
    footer_backing: "#1C3325"
    text_primary_hex: "#C9A84C"
    lighting: "bright even daylight or hazy backlight through foliage"
    subject_rule: "staged rooms or casual subjects, overlapping the panel edge naturally"
    negative_space_rule: "small floating rounded pill in upper-left: headline only. Photo fills 85%+ of frame. Spec row at very bottom edge."
    type_treatment: "bold serif headline in the pill; thin tracked geometric sans for spec row at bottom"

  - name: the_depth_integration
    scene_types: [lifestyle_single]
    tones: [dark_luxury]
    text_tier: full_detail
    text_roles: [headline, subhead, price, info_band, badge]
    info_band_style: price_hero_strip
    layout_type: full-bleed
    text_primary_hex: "#C9A84C"
    lighting: "dusk twilight, ambient city glow, strong warm rim light on subject"
    subject_rule: "centered foreground, back to camera, typography rendered in sky behind"
    negative_space_rule: "dark indigo sky occupies upper 60%; locality headline enormous in sky"
    type_treatment: "locality name as ultra-large gold letterforms filling the night sky behind subject"

  - name: the_dark_water_canvas
    scene_types: [exterior, lifestyle_single]
    tones: [dark_luxury]
    text_tier: full_detail
    text_roles: [headline, price, info_band, cta, badge]
    info_band_style: compact_spec_row
    layout_type: full-bleed
    footer_backing: "#0A0A15"
    text_primary_hex: "#C9A84C"
    lighting: "twilight, cool sky vs warm architectural glow reflecting off water"
    subject_rule: "building or subject symmetrical against sky, eye drawn upward"
    negative_space_rule: "foreground darkened for hero price+headline block; thin spec row at very bottom edge"
    type_treatment: "hero price+headline in darkest foreground zone; single compact spec strip at very bottom"

  - name: the_physical_3d_intrusion
    scene_types: [interior, lifestyle_single]
    tones: [dark_luxury, bright_aspirational]
    text_tier: moderate
    text_roles: [headline, subhead, badge]
    info_band_style: compact_spec_row
    layout_type: full-bleed
    text_primary_hex: "#FFFFFF"
    lighting: "soft warm dim interior ambient, moody textured shadows"
    subject_rule: "subject or furniture partially overlapped by the typographic element"
    negative_space_rule: "massive 3D letters occupy center frame as graphic object; badge at bottom"
    type_treatment: "headline as massive 3D block letters on floor plane; thin serif subhead below"

  - name: the_architectural_dead_zone
    scene_types: [interior]
    tones: [bright_aspirational, dark_luxury]
    text_tier: full_detail
    text_roles: [headline, subhead, price, info_band, badge]
    info_band_style: asymmetric_band
    layout_type: asymmetrical
    text_primary_hex: "#C9A84C"
    lighting: "dappled natural light or crisp cool daylight, high-contrast shadow pools on floor, strong indoor-outdoor light balance — avoid golden-hour amber tones"
    subject_rule: "no people — empty room, architecture is the subject"
    negative_space_rule: "text anchored only to floor-plane shadow pools or the frame's dark outer edges — NEVER projected onto walls or following wall perspective geometry; keep the architectural focal point untouched"
    type_treatment: "sans-serif + serif mix, medium-bold tracked weights, flat overlay anchored to shadow zones — text must read as clean flat typography, never following or warping to wall geometry; legible at arm's length"

  - name: the_golden_archway
    scene_types: [lifestyle_social, interior]
    tones: [bright_aspirational]
    text_tier: full_detail
    text_roles: [headline, subhead, price, info_band, cta, badge]
    info_band_style: strip_three_col
    layout_type: framing_device
    footer_backing: "#B8860B"
    text_primary_hex: "#C9A84C"
    lighting: "bright even interior daylight, warm corporate tones, no harsh shadows"
    subject_rule: "subjects collaborating inside the frame, viewed through the golden overlay"
    negative_space_rule: "gold graphic overlay frame on outer edges = all-text container; photo uncluttered inside"
    type_treatment: "massive bold display sans at one scale, overlapping italic script at a contrasting scale; a secondary subhead in tightly tracked all-caps geometric sans — mixed scale is the visual drama"

  - name: the_backlit_silhouette
    scene_types: [lifestyle_single, lifestyle_social]
    tones: [bright_aspirational]
    text_tier: moderate
    text_roles: [headline, cta, badge]
    info_band_style: compact_spec_row
    layout_type: full-bleed
    text_primary_hex: "#C9A84C"
    lighting: "strong backlight through floor-to-ceiling glass — can be bright white morning light, crisp midday glare, or soft afternoon haze; NOT necessarily golden-hour amber; what matters is the blown-out bright background creating a silhouette, not the colour temperature"
    subject_rule: "dark silhouettes facing the light source, not the camera"
    negative_space_rule: "illuminated foreground surface (bed, stone floor, rug) = headline canvas"
    type_treatment: "bold centered serif headline in gold, placed on bright foreground"

  - name: the_zenith_gaze
    scene_types: [lifestyle_social]
    tones: [bright_aspirational]
    text_tier: moderate
    text_roles: [headline, info_band, cta]
    info_band_style: strip_three_col
    layout_type: full-bleed
    text_primary_hex: "#C9A84C"
    lighting: "bright even overhead daylight preferred — clean neutral light that reveals the surface texture (stone, grass, water) without amber warmth; late afternoon with long shadows acceptable only when the scene specifically calls for it"
    subject_rule: "bird's-eye shot, subjects in relaxed supine or seated poses, centered"
    negative_space_rule: "aerial surface (lawn, courtyard, water) = centered headline canvas; no footer"
    type_treatment: "multiple sizes, strict centered, bold serif, floating over aerial surface"

  - name: the_editorial_triptych
    scene_types: [lifestyle_single, lifestyle_social, interior]
    tones: [dark_luxury, bright_aspirational]
    text_tier: full_detail
    text_roles: [headline, subhead, price, info_band, badge, cta]
    info_band_style: editorial_triptych
    layout_type: editorial_triptych
    footer_backing: "#F5EDD8"
    text_primary_hex: "#C9A84C"
    lighting: "warm ambient interior — near-black tray ceiling with recessed amber cove lighting; ceiling darkness provides the top band backing naturally; the room below is richly lit; city view through glazing optional"
    subject_rule: "no people OR solo candid — positioned in the photo zone clear of both zone boundaries; never cropped by top band or footer"
    negative_space_rule: "top band: location first word dominant line + second line smaller + city + double-bordered BHK box; photo zone: only the scene + decorative plaque badge; footer: icon columns + price + USP"
    type_treatment: "HEAVY display serif location first word fills 82% canvas width naturally (not condensed); second word smaller below a gold hairline; double-bordered BHK frame box; plaque-style badge with double-frame + decorative rules"

  - name: the_zoned_triptych
    scene_types: [lifestyle_single, lifestyle_social, interior]
    tones: [dark_luxury, bright_aspirational]
    text_tier: full_detail
    text_roles: [headline, subhead, price, info_band, badge, cta]
    info_band_style: zoned_triptych
    layout_type: zoned_triptych
    footer_backing: "#F5EDD8"
    text_primary_hex: "#C9A84C"
    lighting: "warm ambient interior — coved ceiling lighting, pendant clusters, floor-to-ceiling glazing with dusk or city-glow exterior; the room feels inhabited and rich at depth"
    subject_rule: "candid group or solo — positioned in the photo zone clear of the top-band cut-line and above the footer strip; never cropped by either zone boundary"
    negative_space_rule: "top band exclusively holds location + city + BHK; photo zone holds only scene + sample badge; footer strip holds price + specs + icon grid; zones never overlap"
    type_treatment: "HEAVY display serif location name fills the dark top band — dominant scale, cream or warm gold; inline framed pill for BHK; stacked price hierarchy in footer (STARTING AT small / ₹X Cr large / ONWARDS small)"

layout_discipline:
  - "COMPARTMENTALIZATION: Never float spec text over photo — use a solid opaque footer block."
  - "DEAD ZONES: Anchor secondary text into shadows and blank walls; keep focal point clear."
  - "PRICE ANCHORING: Isolate the price in a high-contrast badge, separate from the main text."
  - "LOCATION NAME IN PHOTO ZONE (NON-NEGOTIABLE): The locality name (e.g. 'SINDHUBHAVAN ROAD') MUST appear as a large, dominant typographic element within the main photo area of every ad. The footer strip is for secondary spec info only — the location name cannot live exclusively in the footer."
  - "NO CORNER WATERMARKS: The apartment configuration (e.g. '4 & 5 BHK') is primary buying information. It must appear in the footer strip at full weight — never as a tiny corner label, watermark, or superscript anywhere else in the image."

detail_principles:
  typography:
    - "DO limit to two typeface families: elegant serif for headlines, geometric sans for data."
    - "DO utilize extreme letter-spacing on caps to establish hierarchy."
    - "DON'T float dense paragraphs over varied photographic textures."
  lighting:
    - "DO use strong directional light to sculpt dark shadow pools for text."
    - "DO use volumetric backlighting to create natural high-key white space."
    - "DON'T use flat, even, or flash photography lighting."
  composition:
    - "DO frame subjects as scale-references, facing away or gazing into the property."
    - "DO use single-point perspectives or strong architectural leading lines."
    - "DON'T center subjects perfectly unless the layout is hyper-symmetrical."
  colour:
    - "DO map text accent colour to the primary accent colour in the photograph."
    - "DO maintain: dark neutral background + warm accent + stark white/metallic text."
    - "DON'T use vibrant primary colours for text backgrounds."
  branding:
    - "DO keep logo small, one clean corner, adequate padding."
    - "NEVER reproduce any studied brand's logo, wordmark, or merchandise."

vocabulary_additions:
  palettes:
    twilight_amber: "Dominant cool twilight blues and greys, accented with warm glowing amber and gold, backed by dark slate."
    charcoal_burgundy: "Dominant deep black and charcoal, accented with rich burgundy and red, backed by warm skin and wood tones."
    earth_forest: "Dominant warm stone and greys, accented with deep forest green, backed by crisp white and brass."
  structures:
    solid_footer_container: "The bottom 18-20% of the canvas is a narrow solid opaque base strip — a slim branded bar, NOT a mid-frame panel. Photo fills the top 80%."
    open_room_anchor: "Floating headline pill in the upper-left corner — contains only the headline, sized to the text, barely opaque backing. Location name LARGE in the scene's natural dark floor zone (dark tile, shadow pool) just above the spec strip. Photo fills 85%+ of the canvas. Requires a naturally dark floor zone in the scene — do not manufacture one."
    glass_morphism_panel: "A small floating semi-transparent rounded pill or card in the upper-left or upper-centre — narrow, sized only to the headline text, NOT a full-column sidebar. Photo clearly visible through and around it. All other text floats in the photo's natural dark zones."
    asymmetrical: "Text blocks anchored to architectural dead zones in a deliberately asymmetrical composition."
    framing_device: "A massive graphic overlay (arch, border, or frame) on the outer edges acts as the structural container for all text."
  type_moves:
    depth_of_field_integration: "Massive graphic typography rendered physically behind human subjects in the scene's depth."
    physical_3d_typography: "Headlines modeled as solid 3D objects resting on the floor plane, casting environmental shadows."
    interlocking_display_serif: "Highly stylized overlapping serif characters used as a standalone centralized graphic lockup."
