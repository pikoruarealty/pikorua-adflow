# =============================================================================
# image_variants.yaml — Five-variant luxury real estate ad prompt generation
# =============================================================================
# Architecture (new):
#   scene_photography_brief  — universal ~15-line brief for the LLM: how to write
#                              the scene photography description (camera, light,
#                              materials, atmosphere ONLY — no ad layout language).
#   variants                 — per-variant scene_pool, creative_brief, allowed_palettes,
#                              structure_map, and sample_ready_cta.
#   hard_bans                — single source of truth for image_service.py sanitisation.
#
# The full ad prompt is assembled by build_gpt_image_prompt() in image_service.py
# using the LLM's scene_prose + headline + palette_tag and the property brief.
# =============================================================================

# =============================================================================
# scene_photography_brief — injected into every visual_prompter task.
# Tells the LLM how to write its 60-80 word scene description.
# =============================================================================
scene_photography_brief: |
  You are a luxury real estate photographer and architectural observer writing a shot
  brief for a gpt-image-1 render. Write exactly TWO paragraphs.

  PARAGRAPH 1 — Photography setup (50-60 words):
  Camera body + lens, shooting angle and position, focal distance, light quality
  (colour temperature + direction + character of light), time of day, one natural
  photographic imperfection (lens flare, grain, haze, soft chromatic aberration).

  PARAGRAPH 2 — Subject's architectural / material character (50-70 words):
  For exterior scenes: describe the building's facade materials (glazing type, spandrel
  material, balcony profiles, stone / metal / timber details), landscaping in the
  foreground, the quality of finish that signals premium. Be specific enough that a
  renderer knows exactly what kind of building to draw — not "luxury apartment", but
  "floor-to-ceiling glazing with slim dark mullions, fluted limestone spandrels,
  cantilevered timber balconies".
  For interior scenes: floor material + finish (e.g. "honed Calacatta marble with
  book-matched veining"), ceiling height and feature (coffers, voids, exposed concrete),
  dominant furniture profile, surface finish hierarchy, any signature architectural
  detail visible in the shot.

  LIGHT DIVERSITY RULE: Do not default to golden-hour or warm amber tones for every
  scene. Premium real estate photography uses the full light spectrum — blue-hour twilight,
  crisp cool morning, neutral even daylight, bright midday, soft overcast diffused light.
  Use warm golden light ONLY when it genuinely serves this specific scene's emotional
  story. It is NOT a default luxury shorthand. Aim for the light that best reveals the
  material character of the space — marble reads best in cool natural daylight; cityscape
  drama reads best at blue hour; warmth belongs to intimate evening social scenes.

  WINDOW SCALE RULE: Interior scenes must have a substantial natural light source —
  a large window, floor-to-ceiling glazing, or a wide opening that lets the room breathe.
  Narrow slot windows, small portholes, or purely artificial lighting make rooms feel
  enclosed and institutional regardless of material quality. The light opening should be
  large enough that outdoor scenery (trees, sky, city) is partially visible or implied.
  A room that reads "open" signals premium. A room that reads "enclosed" does not.

  NATURAL TEXT SURFACE RULE: Every interior scene must have a naturally dark zone
  (dark floor, shadow pool, unlit wall plane, deep basalt tile) that provides a high-
  contrast surface for the location name without requiring an artificial overlay. Describe
  this dark zone specifically in the scene prose. If the scene has no natural dark zone,
  choose a different scene or adjust the material palette so one exists.

  CLEAN GLAZING ZONE: When the scene uses a large window or floor-to-ceiling glazing as
  the primary light source or typography backdrop, the glass-to-sky transition must be
  fully unobstructed. Do NOT include visible curtain tracks, ceiling-mounted rails, drape
  hardware, or pelmet boxes in or near the glazing zone. These create horizontal bars
  across the upper frame that interrupt and cheapen the typography. Describe the window as
  frameless or with minimal slim mullions only. Sheers or curtains may be shown at the
  very edge of frame — never across the glazing face.

  DO NOT describe: text placement, ad layout, typography, colour zones,
  information hierarchy, or any advertising design elements.
  The output reads like two tight paragraphs from an architectural photographer's shot
  notes — concrete, material-specific, no generic luxury adjectives.

# =============================================================================
# variants — five distinct campaign perspectives.
# =============================================================================
variants:

  lifestyle_private_retreat:
    label: "Lifestyle — Private Retreat"
    allowed_recipes:
      - the_open_room_anchor
      - the_architectural_dead_zone
    default_tone_bias: bright_aspirational
    sample_ready_cta: "Sample flat ready — come experience it"
    # Palette is dynamic (LLM picks per scene); batch distinctness is enforced in
    # output_saver.dedupe_visual_batch so the five ads never share a palette.
    allowed_palettes:
      - charcoal_gold
      - burgundy_gold
      - ivory_warmth
      - slate_cream
    structure_map:
      dark_luxury: structured_split
      bright_aspirational: immersive_fullbleed
    scene_pool:
      - balcony_morning_coffee_solitude
      - bedroom_window_morning_unwind
      - reading_corner_afternoon_light
      - private_balcony_evening_quiet
      - bathroom_spa_ritual_morning_light
    creative_brief: |
      VARIANT: Lifestyle — Private Retreat.
      The apartment as a personal sanctuary — an unhurried, private moment.
      The mood is stillness: morning coffee, a quiet read, an unwind after a long day.
      PEOPLE CONFIGURATION IS DYNAMIC — choose what best serves the scene's story:
        solo (most common for this variant — one person, back to camera or in profile),
        a couple in a quiet shared moment (reading, morning routine),
        or no people at all if the material quality alone carries the scene.
      Never a group. Never a posed or performative moment.
      The person(s), if present, are incidental to the space — the space is the star.
      Styling: lived-in elegant, not catalog-posed, not promotional-shoot stiff.
      Mood: the quiet pleasure of having a home that fits you exactly.

  lifestyle_social_home:
    label: "Lifestyle — The Social Home"
    allowed_recipes:
      - the_golden_archway
      - the_horizon_anchor
      - the_zenith_gaze
    default_tone_bias: bright_aspirational
    sample_ready_cta: "Sample flat ready — see the space"
    allowed_palettes:
      - burgundy_gold
      - charcoal_gold
      - ivory_warmth
      - navy_gold
    structure_map:
      dark_luxury: structured_split
      bright_aspirational: immersive_fullbleed
    scene_pool:
      - kitchen_casual_hosting_moment
      - living_room_evening_conversation
      - dining_area_intimate_dinner
      - balcony_sundowner_with_guests
      - living_room_family_afternoon
    creative_brief: |
      VARIANT: Lifestyle — The Social Home.
      The apartment enables its best version of shared life — hosting, gathering, belonging.
      PEOPLE CONFIGURATION IS DYNAMIC — choose what best serves the scene's story:
        a couple hosting friends (3-4 people total),
        a family of three or four in an easy afternoon moment,
        two close friends in conversation,
        or a small group on the balcony for sundowners.
      Never a solo individual (that belongs to Private Retreat).
      Never posed or formal — always candid, always mid-moment, never looking at the camera.
      The room should feel like it was designed for exactly this kind of gathering.
      Mood: warmth, ease, the feeling that this home makes social life effortless.

  lifestyle_dynamic_a:
    label: "Lifestyle — Scene A"
    allowed_recipes:
      - the_open_room_anchor
      - the_zenith_gaze
      - the_architectural_dead_zone
      - the_depth_integration
      - the_horizon_anchor
    default_tone_bias: bright_aspirational
    sample_ready_cta: "Sample flat ready — step inside"
    allowed_palettes:
      - burgundy_gold
      - slate_cream
      - charcoal_gold
      - ivory_warmth
      - navy_gold
    structure_map:
      dark_luxury: immersive_fullbleed
      bright_aspirational: structured_split
    scene_pool:
      - family_living_room_sunday_afternoon
      - parent_and_child_reading_corner
      - home_office_afternoon_focus
      - kitchen_solo_cooking_evening
      - morning_dressing_room_ritual
      - yoga_wellness_balcony_morning
      - bedroom_sunday_morning_couple
      - children_playroom_afternoon_light
      - balcony_city_panorama_dusk
      - living_room_solo_reading_evening
    creative_brief: |
      VARIANT: Lifestyle — Dynamic Scene A.
      Open brief. Choose any residential lifestyle moment that is NOT covered by:
        — Private Retreat (personal solitude, one person quiet and still)
        — The Social Home (hosting guests, group gathering, entertaining)
      Everything else in the life of this home is available: a parent with a child,
      working from home, a couple on a Sunday morning, a family ritual, wellness and
      fitness, cooking alone, a personal care moment, an evening in, city-view scenes.
      PEOPLE CONFIGURATION IS DYNAMIC — solo, couple, family, child, no person —
      whatever the scene calls for naturally.
      The scene must feel real and lived-in. Not a catalogue shoot.
      Mood: the ease of a home that fits exactly how you live.

  lifestyle_dynamic_b:
    label: "Lifestyle — Scene B"
    allowed_recipes:
      - the_glass_morphism_shield
      - the_backlit_silhouette
      - the_sky_chandelier
