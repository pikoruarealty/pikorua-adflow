      VARIANT: Lifestyle — The Address (legacy).
      City-view lifestyle scene. People optional.

# =============================================================================
# Hard bans — single source of truth for image_service.py sanitisation.
# =============================================================================
hard_bans:
  claims_absolute:
    - "guaranteed returns"
    - "guaranteed appreciation"
    - "investment guarantee"
    - "no gst"
    - "tax free"
    - "tax-free"
    - "instant possession"
    - "best in the city"
    - "best in india"
    - "best in the world"
    - "world's tallest"
    - "india's tallest"
    - "cheapest"
    - "lowest price guaranteed"
    - "number one"
    - "no. 1"
    - "limited units"
    - "few units remain"
    - "only 3 homes"
    - "final 5 floors"
  claims_conditional:
    "rera approved": rera_verified
    "rera registered": rera_verified
    "award winning": verified_awards
    "award-winning": verified_awards
    "certified green building": verified_certifications
    "green certified": verified_certifications
  fabrication_never_invent:
    rera number: rera_verified
    rera registration: rera_verified
    possession date: possession_date
    award: verified_awards
    certified: verified_certifications
    certification: verified_certifications
    km from: verified_landmarks
    minutes from: verified_landmarks
    metro station: verified_landmarks
    iconic landmark: verified_landmarks
    testimonial: null
    quote from: null
