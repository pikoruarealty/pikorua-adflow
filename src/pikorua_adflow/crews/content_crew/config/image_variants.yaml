      - charcoal_gold
    structure_map:
      dark_luxury: immersive_fullbleed
      bright_aspirational: structured_split
    scene_pool:
      - balcony_morning_yoga_city_backdrop
      - home_office_afternoon_focus
      - master_bedroom_sunday_morning
      - dressing_room_morning_ritual
      - kitchen_solo_cooking_evening
      - children_at_play_natural_light
      - couple_morning_coffee_balcony
      - evening_balcony_book_and_city
      - living_room_solo_music_evening
      - family_living_room_sunday_afternoon
    creative_brief: |
      VARIANT: Lifestyle — Dynamic Scene B.
      Open brief. Choose any residential lifestyle moment that is NOT covered by:
        — Private Retreat (personal solitude, one person quiet and still)
        — The Social Home (hosting guests, group gathering, entertaining)
        — The scene already chosen for Dynamic Scene A in this batch
      The scene must differ meaningfully from Scene A: different room, different time
      of day, different emotional register. If A was family/daytime, B should be
      individual or couple/evening, or vice versa.
      PEOPLE CONFIGURATION IS DYNAMIC — whatever composition best serves the scene.
      Mood: another facet of life in this home — a different story, not the same one told twice.

  interior_signature_moment:
    label: "Interior Signature Moment"
    allowed_recipes:
      - the_architectural_dead_zone
