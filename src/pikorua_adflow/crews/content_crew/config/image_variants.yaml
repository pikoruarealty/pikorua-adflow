# =============================================================================
# image_variants.yaml — Five-variant luxury real estate ad prompt generation
# =============================================================================
# Architecture (new):
#   scene_photography_brief  — universal ~15-line brief for the LLM: how to write
#                              the scene photography description (camera, light,
#                              materials, atmosphere ONLY — no ad layout language).
#   variants                 — per-variant scene_pool, creative_brief, allowed_palettes,
#                              structure_map, and sample_ready_cta.
#   hard_bans                — single source of truth for image_service.py sanitisation.
#
# The full ad prompt is assembled by build_gpt_image_prompt() in image_service.py
# using the LLM's scene_prose + headline + palette_tag and the property brief.
# =============================================================================

# =============================================================================
# scene_photography_brief — injected into every visual_prompter task.
# Tells the LLM how to write its 60-80 word scene description.
# =============================================================================
scene_photography_brief: |
  You are a luxury real estate photographer and architectural observer writing a shot
  brief for a gpt-image-1 render. Write exactly TWO paragraphs.

  PARAGRAPH 1 — Photography setup (50-60 words):
  Camera body + lens, shooting angle and position, focal distance, light quality
  (colour temperature + direction + character of light), time of day, one natural
  photographic imperfection (lens flare, grain, haze, soft chromatic aberration).

  PARAGRAPH 2 — Subject's architectural / material character (50-70 words):
  For exterior scenes: describe the building's facade materials (glazing type, spandrel
  material, balcony profiles, stone / metal / timber details), landscaping in the
  foreground, the quality of finish that signals premium. Be specific enough that a
  renderer knows exactly what kind of building to draw — not "luxury apartment", but
  "floor-to-ceiling glazing with slim dark mullions, fluted limestone spandrels,
  cantilevered timber balconies".
  For interior scenes: floor material + finish (e.g. "honed Calacatta marble with
  book-matched veining"), ceiling height and feature (coffers, voids, exposed concrete),
  dominant furniture profile, surface finish hierarchy, any signature architectural
  detail visible in the shot.

  DO NOT describe: text placement, ad layout, typography, colour zones,
  information hierarchy, or any advertising design elements.
  The output reads like two tight paragraphs from an architectural photographer's shot
  notes — concrete, material-specific, no generic luxury adjectives.

# =============================================================================
# variants — five distinct campaign perspectives.
# =============================================================================
variants:

  lifestyle_private_retreat:
    label: "Lifestyle — Private Retreat"
    allowed_recipes:
      - the_editorial_sidebar
      - the_architectural_dead_zone
    default_tone_bias: bright_aspirational
    sample_ready_cta: "Sample flat ready — come experience it"
    allowed_palettes:
      - ivory_warmth
      - charcoal_gold
      - slate_cream
    structure_map:
      dark_luxury: structured_split
      bright_aspirational: immersive_fullbleed
    scene_pool:
      - balcony_morning_coffee_solitude
      - bedroom_window_morning_unwind
      - reading_corner_afternoon_light
      - private_balcony_evening_quiet
      - bathroom_spa_ritual_morning_light
    creative_brief: |
      VARIANT: Lifestyle — Private Retreat.
      One person in a private, unhurried moment — never facing camera.
      This is the apartment as personal sanctuary: the morning coffee on the balcony,
      the quiet read, the unhurried unwind. No social performance, no group.
      The person is incidental to the space — the space is the star.
      Styling: lived-in elegant, not catalog-posed.
      Mood: stillness, personal luxury, the quiet pleasure of having a home that fits you.

  lifestyle_social_home:
    label: "Lifestyle — The Social Home"
    allowed_recipes:
      - the_golden_archway
      - the_horizon_anchor
      - the_zenith_gaze
    default_tone_bias: bright_aspirational
    sample_ready_cta: "Sample flat ready — see the space"
    allowed_palettes:
      - ivory_warmth
      - burgundy_gold
      - charcoal_gold
    structure_map:
      dark_luxury: structured_split
      bright_aspirational: immersive_fullbleed
    scene_pool:
      - kitchen_casual_hosting_moment
      - living_room_evening_conversation
      - dining_area_intimate_dinner
      - balcony_sundowner_with_guests
      - living_room_family_afternoon
    creative_brief: |
      VARIANT: Lifestyle — The Social Home.
      Two or three people in a candid social moment — hosting, gathering, conversation.
      This apartment enables the best version of your social life: a kitchen where
      people naturally cluster, a living room that invites lingering, a balcony made
      for sundowners. Never posed or formal.
      Mood: warmth, connection, the ease of a home that brings people together.

  lifestyle_city_connection:
    label: "Lifestyle — City Connection"
    allowed_recipes:
      - the_depth_integration
      - the_editorial_sidebar
      - the_horizon_anchor
    default_tone_bias: dark_luxury
    sample_ready_cta: "Sample flat ready — see the view"
    allowed_palettes:
      - navy_gold
      - slate_cream
      - charcoal_gold
    structure_map:
      dark_luxury: immersive_fullbleed
      bright_aspirational: structured_split
    scene_pool:
      - balcony_city_panorama_dusk
      - floor_to_ceiling_window_cityscape_evening
      - balcony_evening_wind_down_city_glow
      - bedroom_city_view_morning_light
      - living_room_floor_to_ceiling_day
    creative_brief: |
      VARIANT: Lifestyle — City Connection.
      The city of Ahmedabad is always visible — through full-height glazing, from the
      balcony, or as a glowing panorama at dusk. One person or no people; the view is
      the subject. This is what the address sells: the relationship with the city.
      Favour dusk or blue-hour: the cityscape glows, interior and exterior light balance.
      Mood: urban luxury, the feeling of being above it all while connected to everything.

  exterior_establishing_shot:
    label: "Exterior Establishing Shot"
    allowed_recipes:
      - the_dark_water_canvas
      - the_sky_chandelier
      - the_horizon_anchor
    opt_in: true
    default_tone_bias: dark_luxury
    sample_ready_cta: "Visit the site — sample flat now open"
    allowed_palettes:
      - navy_gold
      - charcoal_gold
      - forest_gold
      - burgundy_gold
    structure_map:
      dark_luxury: bordered_campaign
      bright_aspirational: structured_split
    scene_pool:
      - twilight_street_level_light_trails
      - daytime_three_quarter_drone_angle
      - dusk_landscaped_approach
      - dawn_empty_street_long_exposure
      - golden_hour_low_angle_full_height
    creative_brief: |
      VARIANT: Exterior Establishing Shot.
      The only variant showing the building from outside.
      Use the user-supplied exterior description (number of towers, storeys, facade
      materials, podium, landscaping, amenities) as the primary reference — do not
      invent building details.
      Favour blue-hour or twilight: deep indigo sky, warm interior lights glowing
      from units, motion-blurred light trails on street.
      Camera: Sony A7R V, 85mm f/4 or tilt-shift 50mm; long exposure, ISO 200, tripod.
      Never head-on symmetrical — use a three-quarter angle showing two facades.
      Mood: authority, scale, arrival — the image that makes someone think "that's the one."

  interior_signature_moment:
    label: "Interior Signature Moment"
    allowed_recipes:
      - the_architectural_dead_zone
      - the_glass_morphism_shield
      - the_horizon_anchor
    default_tone_bias: dark_luxury
    sample_ready_cta: "Step inside — sample flat ready"
    allowed_palettes:
      - burgundy_gold
      - ivory_warmth
      - charcoal_gold
    structure_map:
      dark_luxury: immersive_fullbleed
      bright_aspirational: structured_split
    scene_pool:
      - living_room_dusk_diagonal_light
      - bedroom_quiet_dawn_glow
      - kitchen_empty_morning_light
      - study_or_reading_nook_lamp_glow
      - bathroom_spa_material_warmth
    creative_brief: |
      VARIANT: Interior Signature Moment.
      The room is the protagonist. No people.
      Light quality and material texture carry the entire emotional argument:
      a dramatic diagonal of sunlight crossing a marble floor, a dusk cityscape
      glowing through full-height windows, one carefully placed object (dried flowers,
      a sculptural vase) as the single human touch. Nothing else.
      Mood: quiet luxury — the feeling of entering a room that knows it is exceptional.

# =============================================================================
# Hard bans — single source of truth for image_service.py sanitisation.
# =============================================================================
hard_bans:
  claims_absolute:
    - "guaranteed returns"
    - "guaranteed appreciation"
    - "investment guarantee"
    - "no gst"
    - "tax free"
    - "tax-free"
    - "instant possession"
    - "best in the city"
    - "best in india"
    - "best in the world"
    - "world's tallest"
    - "india's tallest"
    - "cheapest"
    - "lowest price guaranteed"
    - "number one"
    - "no. 1"
    - "limited units"
    - "few units remain"
    - "only 3 homes"
    - "final 5 floors"
  claims_conditional:
    "rera approved": rera_verified
    "rera registered": rera_verified
    "award winning": verified_awards
    "award-winning": verified_awards
    "certified green building": verified_certifications
    "green certified": verified_certifications
  fabrication_never_invent:
    rera number: rera_verified
    rera registration: rera_verified
    possession date: possession_date
    award: verified_awards
    certified: verified_certifications
    certification: verified_certifications
    km from: verified_landmarks
    minutes from: verified_landmarks
    metro station: verified_landmarks
    iconic landmark: verified_landmarks
    testimonial: null
    quote from: null
