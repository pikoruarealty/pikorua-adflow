write_meta_ads:
  description: >
    Write 5 Meta ad copy variants for {product}. Your BRAND VOICE REFERENCE (in your
    backstory) is the authority on tone, banned words, and register — follow it. This
    task adds only the structure and the hard rules.

    FORMAT (hard limits):
    - Headline: 30 characters or fewer. A complete, confident thought — not a riddle,
      not a question, not generic filler ("Luxury Living", "Premium Homes").
    - Body: 125 characters or fewer. Maximum 2 sentences, each doing one job — do not
      stack clauses. End with a soft invitation, never a hard sell. Whether you may
      name the firm is governed entirely by the COMPANY NAME RULE below — never default
      to naming a brand.
    - No two variants may open with the same word or share a sentence shape.

    STEP 1 — FIND 5 HOOKS IN THE BRIEF, NOT IN A CATEGORY LIST.
    Before writing a single word, read {product} and {persona}. List 5 specific things
    about THIS property that could make a HNI or NRI buyer stop mid-scroll and think
    "what is that?" Each hook must be grounded in a real detail — the address, the size,
    the access, the buyer profile, something from the persona. If the hook would work
    equally well for a different property in the same city, discard it and find a better one.
    The test: read only the headline. Would you click? If not, rewrite.

    THIN-BRIEF FALLBACK — if the property has no standout feature.
    Some briefs list no architectural feature, no view, no club, no signature amenity.
    When that happens, do NOT invent one and do NOT retreat to safe luxury clichés
    ("Where luxury meets lifestyle", "Elevated living"). Build specificity from the
    material you DO have: the exact address/micro-locality, the price bracket and what
    that bracket signals about the buyer, the configuration (e.g. 4BHK), the property
    type, and the persona's stated motivation (return to India, portfolio, family,
    discretion). A precise address + a precisely-named buyer motivation is specific.
    An invented feature is a HARD FAIL. Specificity must come from real facts only —
    never from a fabricated inventory count, floor number, scarcity figure, or amenity.

    STEP 2 — WRITE ONE VARIANT PER HOOK.
    Each variant pursues one of those 5 hooks. Use a different creative move per variant:
    - Number as statement: ONE number states a fact; the lines that follow reframe it as
      a life position, not a count. (A watch brand: "300 metres." → "The depth most men
      never reach." The number is the door; the reframe is the room.)
      ANTI-EXAMPLE — do NOT do this: "Four bedrooms. Five bedrooms." That is a spec list,
      not a number statement. Listing two configurations is interchangeable with any floor
      plan brochure. Choose ONE number, then make the reader feel what it means.
    - Place as identity: name only the location and stop. Trust the address to carry weight.
      (A hotel says only "Park Avenue" and lets the reader supply the prestige.)
      USE THIS SPARINGLY — at most ONE variant, and only if the address genuinely carries
      prestige on its own. A bare locality name ("Sindhu Bhavan Road.") is the laziest
      possible headline; if every campaign defaults to it, it stops meaning anything.
    - Contrast: name what the category does, then name what this property does instead.
      The gap between them is the headline. (A car brand: faster vs. quieter.)
    - Fragment sequence: short, rhythmic pieces accumulate to a single decision.
      HARD LIMIT on this technique: never close a fragment sequence with a
      single-word possessive or declarative claim — "Yours.", "Home.", "Claimed.",
      "Done.", "Earned." These feel like a hard sell wearing the costume of restraint.
      End on a property truth, not a claim of ownership.
      SECOND HARD LIMIT: a fragment sequence is NOT a spec list. "Four bedrooms.
      Five bedrooms. Sindhu Bhavan Road." lists facts — it does not accumulate to a
      decision. Each fragment must advance the thought, not add another data point.
    - Reversal: deny the literal thing the buyer thinks they're buying, offer something larger.
    - Restraint as scarcity: imply rarity through what you do NOT say.
    If two variants share the same sentence shape, rewrite the weaker one.

    COVERAGE CHECK (after writing, not before):
    Look back at your 5 variants. Between them, have you touched: something aspirational,
    something financial, something about legacy or family, something about discretion/access?
    If three variants say the same thing from different angles, replace the weakest.
    These are diversity guardrails — do not use them as angle labels or write toward them
    before you've found the hooks in the property.

    TREND CONTEXT — background only:
    {trends} is research context. Use a trend only if it directly applies to THIS property's
    specific locality — not the city in general, not a nearby district. If a trend mentions
    GIFT City and the property is on Sindhu Bhavan Road, the trend is background, not copy
    material. Buyers will verify the address. Mismatched geography destroys trust.

    FRESHNESS — fight your own defaults:
    You write campaigns like this constantly, and you have favourite moves you reach for on
    autopilot: the bare locality name, the "Not an investment — a return" reversal, the
    square-footage number-statement. If a headline is one you could have written for a
    different property last week, it is stale — bin it. Concretely:
    - The 5 headlines must use 5 DIFFERENT creative techniques from the list above — never
      three number-statements, never two bare-locality lines.
    - Do not repeat sentence skeletons you tend to fall back on ("Not X. Y.", "X sq ft.
      One address.", "Where X meets Y."). If your draft fits one of those moulds, rebuild it.
    - The trend context is the SAME each run for a given city — so do NOT let it pull every
      headline toward the same idea (rates, NRI demand, appreciation). A trend earns at most
      one variant; the other four come from THIS property's specifics.

    ORIGINALITY CHECK — last step before output:
    Read your 5 headlines. If any headline matches phrasing you recognise from training data,
    industry examples, or your brand voice reference, rewrite it. The brand voice examples
    exist for register calibration only — they are not a phrase bank. Every line must have
    been written for THIS specific property.

    COMPANY NAME RULE — the company name for this run is: "{company_name}"
    - If that value is NON-BLANK: you may end one variant's body with a soft invitation
      that names it once — e.g. "Talk to {company_name}." Keep it understated, one mention
      maximum across the whole body.
    - If that value is BLANK (empty quotes above): the copy is unbranded. The words
      "Pikorua"/"PIKORUA" — and ANY other company, firm, or brand name — MUST NOT appear
      anywhere in any variant: not as a sign-off, not mid-sentence, not as a label. Your
      backstory describes HOW the firm writes (its voice), NOT a name you are licensed to
      print. End bodies on the property thought or a soft invitation with no brand at all.
    Never invent a company name.

    BRAND NAME CAPS: only relevant when the value above is non-blank AND equals "Pikorua"
    (any casing) — then always write it "PIKORUA" (all capitals). If the value is blank,
    this rule does not apply because no brand name appears at all.

    FINAL CHECK before output: re-read all 5 bodies. If "{company_name}" is blank and the
    word "Pikorua" (or any brand name) appears anywhere, delete it and re-end that line.

    THREE HARD RULES (evaluator auto-fails these):
    - Never invent a scarcity or urgency claim. "Fewer than 10 units remain",
      "Only 3 homes left", "Just 12 residences", "Final 5 floors", "Limited units" —
      these are fabricated inventory counts and are a HARD FAIL regardless of how
      plausible they sound. Scarcity is implied through what you do NOT say, never
      through a number you invented. This rule applies before you write a single word.
    - Never name the property/project. Reference by address, size, type only.
    - Never invent any other number — no floor counts, percentages, occupancy rates,
      appreciation figures, or price-per-sqft unless present in {product}.

    APPROVED CAMPAIGN MEMORY — study these real examples from past Pikorua runs that
    performed well enough to be approved and published. Use them for register calibration
    and to understand what has worked before — NOT as a phrase bank or template to copy.
    If a hook or sentence shape below is familiar, find a fresher angle for this run.
    {past_campaigns}

    Buyer context: {target_audience}
    Persona insight: {persona}
  expected_output: >
    A numbered list of 5 ad copy variants. Each variant labelled with its hook (written
    as an ad creative would label it — a short, punchy descriptor, not an analyst's category):
      Headline: [text] [X chars]
      Body: [text] [X chars]
    No variant shares the same opening word as another.
    No invented statistics or inventory numbers anywhere in the output.
  agent: campaign_copywriter

write_google_ads:
  description: >
    Write Google Search ad copy for {product}.

    FORMAT:
    - 3 headlines, each 30 characters or fewer
    - 2 descriptions, each 90 characters or fewer

    Your BRAND VOICE REFERENCE (in your backstory) governs tone and banned words —
    Google copy is more functional than Meta, but the no-urgency, no-hard-sell rules still apply.

    HEADLINE RULES:
    - Each headline does a different job — not three variations of one idea.
    - At least one must carry a concrete detail from {product}, {city}, or {price_cr}
      (an address, size, or price tier). A headline that only repeats what the buyer
      typed into search ("Premium Homes Ahmedabad") wastes the slot — it is interchangeable
      with every competitor.
    - If {company_name} is provided (non-blank): one headline should name {company_name}
      to build brand recall. If {company_name} is blank: use that slot for an additional
      property detail or benefit instead — do not invent a brand name.

    DESCRIPTION RULES:
    - Each description does a different job — do not repeat the headline or each other.
    - Description 1: what makes this property specific — a detail only an insider would know
      (configuration, exact price tier, locality). If {company_name} is non-blank, you may
      reference {company_name}'s access or curation; if blank, describe the property advantage
      without naming any company.
    - Description 2: a soft invitation, not a command (no "Book Now" / "Get Quote").

    BRAND NAME CAPS: When {company_name} is "Pikorua" (or any casing), always write it as
    "PIKORUA" (all capitals) in output copy. Never "Pikorua" or "pikorua".

    NEVER NAME THE PROPERTY: Do not use the developer's project name or title in any copy
    line. Reference by address, configuration, price, or type only.

    The test for every line: could a competitor paste it under their own listing unchanged?
    If yes, it is too generic — add the detail only an insider to this property would have.

    NEVER INVENT: Only use details present in {product}, {city}, {price_cr}.
    No fabricated statistics, appreciation figures, or inventory claims.

    Buyer context:
    {target_audience}

    Persona insight:
    {persona}
  expected_output: >
    OUTPUT ONLY THE FINAL FIVE LINES — nothing else. Do NOT show your selection
    process, alternatives, rejected drafts, character-count math, trimming passes,
    or any commentary or preamble. The very first character of your output is "H"
    (the start of "Headline 1:"). Exactly:
      Headline 1: ...
      Headline 2: ...
      Headline 3: ...
      Description 1: ...
      Description 2: ...
    Plain text only — no markdown bold or asterisks. No character counts in brackets.
    Do all your thinking silently; the saved answer is only these five labelled lines.
  agent: campaign_copywriter

write_whatsapp_script:
  description: >
    Write a WhatsApp Business message template for {product}.

    Context: A luxury real estate consultancy is sending this to a client they already
    know. The consultancy has sourced this property and is giving the client early
    access before it gets wider attention.
    Company name for this run: {company_name} (use this if non-blank; if blank, refer
    to the consultancy as "we" and sign off with the sender's name only — do not
    invent or assume a company name).

    The message must follow this structure:
    1. Greeting (use [Name] as placeholder — warm, not "Dear Sir/Madam")
    2. Hook (one sentence about the specific property — only use details from {product};
       must be intriguing and specific, not generic — make the recipient stop scrolling.
       NEVER use the property's project name — reference by city/locality, configuration,
       price tier, or type only)
    3. Offer statement (if {company_name} is non-blank: "{company_name} has arranged access";
       if blank: "we have arranged access" — frame it as a privilege, not a pitch)
    4. CTA (soft, relationship-driven — "Would you like a private walkthrough?")
    5. Opt-out line (required: "Reply STOP to unsubscribe")

    Total length: 120 words or fewer.
    Tone: Jitendra texting a contact he respects — warm, direct, one thought per
    sentence. Not a newsletter. Not a press release. A message a real person sends.

    Your BRAND VOICE REFERENCE (in your backstory) lists the words and phrases that
    damage the brand. On WhatsApp the specific killers are corporate-letter openers —
    avoid "I am reaching out because", "has come to our attention", "given your profile",
    "I hope this message finds you well", "I am pleased to present", "curated exclusively
    for", and any close variant.

    REGISTER — match this feel, do not reuse the wording:
    - WRONG feel: "I am reaching out because a property that aligns with your vision for
      the next chapter has come to our attention." (a form letter wearing a tie)
    - RIGHT feel: Jitendra texts a contact he respects — one specific true detail about
      the property (from {product}), a signal that the sender found it for them, and a
      natural reason to reply. Warm, brief, no invented facts.
    Build your own message from {product}. Do not lift an example address or phrasing —
    if it isn't in {product}, it doesn't go in the message.

    NEVER NAME THE PROPERTY: Never use the project name or developer's title in the message.
    Reference by city/locality, configuration, price, or type only — never by project name.

    BRAND NAME CAPS: When {company_name} is "Pikorua" (or any casing), always write it as
    "PIKORUA" (all capitals) in the message. Never "Pikorua" or "pikorua".

    NEVER INVENT: Do not add details not present in {product} — no invented
    floor numbers, inventory counts, percentage returns, or market statistics.

    Buyer context:
    {target_audience}

    Persona insight:
    {persona}
  expected_output: >
    The complete WhatsApp message with each section labelled:
    Greeting / Hook / Offer / CTA / Opt-out.
    Plain text only — no markdown bold or asterisks. No character or word counts. No invented facts.
  agent: campaign_copywriter

write_email:
  description: >
    Write a single email for {product} targeting {target_audience}.

    Context: A luxury real estate consultancy is writing to a prospect or known client.
    The email should feel like a note from an advisor who thought of this person
    specifically when he heard about the property — not a blast email.
    Company name for this run: {company_name} (use this if non-blank when signing off
    or referencing the firm; if blank, sign off with only the sender's name — do not
    invent or assume a company name).

    Requirements:
    - Subject line: 50 characters or fewer — specific, creates curiosity, no clickbait
    - Preview text: 90 characters or fewer — extends the subject's intrigue, not a repeat
    - Body: 100–130 words. Three short paragraphs:
        1. One sentence that earns attention — specific to {product}, not generic;
           open with something the reader hasn't heard before. NEVER use the project name
           — reference by address, configuration, price tier, or type only.
        2. Two sentences: what the property is and why the firm is uniquely positioned to
           guide the reader to it. If {company_name} is non-blank, name them; if blank,
           use "we" or "our team" — do not invent or assume a company name.
        3. One soft CTA — an invitation to connect, not a form fill or "Book Now"
    - Sign off as Jitendra
    - Tone: a trusted advisor's note, not a newsletter; reads like it was written for
      this one person, not formatted for a mail merge

    Your BRAND VOICE REFERENCE (in your backstory) lists banned words. For email, also
    avoid corporate-blast openers and their close variants: "I hope this email finds you
    well", "I am pleased to share", "given your investment profile", "I wanted to bring to
    your attention", "a rare opportunity", "limited availability".

    SUBJECT LINE — match the feel, write your own:
    - WRONG: a generic listing label or an overused phrase ("Exclusive Luxury Property",
      "A Rare Opportunity") — reads like spam, says nothing.
    - RIGHT: either one concrete detail from {product} that hints at early access, OR a
      short personal line that sounds like one advisor thinking of one person. Curiosity
      without clickbait.

    BODY OPENING — match the feel, write your own:
    - WRONG: "I am pleased to bring to your attention a rare property that aligns with your
      investment profile and lifestyle aspirations." (mail-merge, no real information)
    - RIGHT: lead with one true, specific thing about THIS property (from {product}) that
      the reader hasn't heard, then make the case for 20 minutes of their attention.

    NEVER NAME THE PROPERTY: Never use the project name or developer's title anywhere in
    the email. Reference by address, configuration, price tier, or property type only.

    BRAND NAME CAPS: When {company_name} is "Pikorua" (or any casing), always write it as
    "PIKORUA" (all capitals) in the email. Never "Pikorua" or "pikorua".

    NEVER INVENT: Only use property details present in {product}.
    No fabricated statistics, appreciation percentages, or inventory claims.

    Persona insight (use to personalise the angle):
    {persona}

    Trend hooks (weave in only if genuinely relevant — do not force):
    {trends}
  expected_output: >
    Formatted as:
      Subject: ...
      Preview: ...
      ---
      [Email body — 3 short paragraphs, signed Jitendra]
    Plain text only — no markdown bold or asterisks. No character or word counts appended.
  agent: campaign_copywriter

evaluate_copy:
  description: >
    Review all 5 Meta ad copy variants produced in write_meta_ads.
    Score each variant on four dimensions, each out of 10:

    1. BRAND VOICE COMPLIANCE
       Does it sound like the brand voice — calm, specific, understated luxury?
       Or does it sound generic, loud, or template-driven?
       Your BRAND VOICE REFERENCE (loaded into your backstory) contains the full banned
       words list, approved headline examples, and rejected examples. Use it as your
       primary scoring rubric for this dimension — do not score from memory alone.
       Penalise any word or pattern listed in the "Words and phrases we NEVER use" section.
       Penalise headlines that are pure spec lists — "Four bedrooms. Five bedrooms." reads
       like a floor-plan brochure, not an ad. A real number-statement technique uses ONE
       number and then reframes it; a real fragment sequence builds to a decision, not a list.

    2. PLATFORM FIT
       Is the headline within 30 characters? Body within 125 characters?
       Does it suit the Meta feed format — scroll-stopping but not clickbait?
       Penalise: headlines that are riddles, questions, or incomplete thoughts.

    3. SPECIFICITY
       Does the copy use real, concrete details from {product} and {city}?
       Or is it interchangeable with any other property ad?
       Penalise: copy that could describe any luxury property anywhere in India.

    4. LUXURY SIGNAL
       Does it signal exclusivity and status without stating it bluntly?
       Would a ₹7Cr+ buyer feel seen, or feel sold to?
       Penalise: "Trusted by celebrities", "Book Now", "Get Quote", "Limited availability".

    AUTOMATIC FLAG — regardless of scores, immediately flag any variant that:
    - Contains the property name (e.g. "Anamika Heights", "ABC Heights") — the
      consultancy never names the developer's project in paid ads.
    - Contains an invented scarcity or urgency claim — "Fewer than 10 units remain",
      "Only 3 homes left", "Just 12 residences", "Final 5 floors", "Limited units",
      "Available for a limited time". These are HARD FAILS. Fabricated counts are not
      "scarcity signals" — they are falsehoods. If the number does not appear verbatim
      in {product}, it is invented. Flag immediately, do not score the rest.
    - Contains any other invented number not in {product} — floor counts, appreciation
      percentages, occupancy figures, price-per-sqft, market statistics.
    - Uses the wrong property type. {product} specifies the property type (e.g. apartment,
      villa, penthouse, commercial office). If the copy calls it a different type
      (e.g. "bungalow" when the brief says "apartment") that is a factual error and
      a HARD FAIL — misrepresenting the property type destroys buyer trust.
    - Names a company/brand when this run is unbranded. The company name for this run is:
      "{company_name}". If that value is BLANK and a variant contains "Pikorua"/"PIKORUA"
      or any other company/firm/brand name, that is a HARD FAIL — the run is unbranded and
      no brand name may appear. (If the value is non-blank, naming it is allowed.)
    These are disqualifying errors. Flag them with "HARD FAIL" so the rewriter knows
    the issue is structural, not stylistic.

    Scoring: 1–5 = failing, 6–7 = acceptable, 8–9 = strong, 10 = rare/exceptional.
    A variant scores below 6 on ANY dimension OR triggers an AUTOMATIC FLAG = FLAG FOR REWRITE.

    For each flagged variant give ONE specific, actionable failure reason.
    Example: "Variant 3 — Specificity 4/10: 'Where luxury meets lifestyle' could describe
    any property in India. Replace with a detail specific to {product}."

    Context for scoring:
    Product: {product}
    Property type (must match copy exactly): {property_type}
    City: {city}
    Persona: {persona}
  expected_output: >
    A structured scorecard with this format for each variant:

      Variant N — [emotional angle]
      1. Brand Voice:   X/10
      2. Platform Fit:  X/10
      3. Specificity:   X/10
      4. Luxury Signal: X/10
      Overall: X/10 (average)
      Status: PASS or FLAG — [one-line reason if flagged]

    Followed by a summary line:
      "X/5 variants passed. Y flagged for rewrite: Variants [list]."

    Save to outputs/copy_scorecard.md.
  agent: copy_evaluator
  output_file: outputs/copy_scorecard.md
  context:
    - write_meta_ads

rewrite_flagged:
  description: >
    Read the copy scorecard from evaluate_copy.
    If 0 variants were flagged, output "No rewrites needed." and stop.

    For each flagged variant, rewrite ONLY that variant.
    You must address the specific failure reason given in the scorecard.
    Do not rewrite variants that passed.
    Maximum 2 rewrite attempts per variant — if you cannot improve the score,
    note the difficulty and leave the original with a warning.

    REWRITE QUALITY BAR — the rewrite must be better than the original, not safer:
    - Do NOT compress the original into a vague fragment (chopping it to "[Place]. Elevated."
      is worse, not better — it loses the specificity that gave it any chance).
    - Do NOT strip out the property detail that made the original specific.
    - A rewrite that could describe any property in India is an automatic failure.
    - Diagnose why the original failed, then apply a DIFFERENT creative technique from the
      write_meta_ads list (number as statement, place as identity, contrast, fragment
      sequence, reversal, restraint as scarcity) — build the line yourself, do not reuse
      any example wording.
    - The rewrite must score higher than the original on Brand Voice AND Luxury Signal.

    Apply the same rules as write_meta_ads:
    - Headline ≤ 30 characters, body ≤ 125 characters
    - No invented facts, no invented numbers, no unit counts
    - NEVER use the property name — reference by address, size, or type only
    - No banned words
    - Specific to {product} and {city}
    - One clear emotional angle per variant

    Persona context: {persona}
    Trend hooks: {trends}
  expected_output: >
    For each rewritten variant:
      Variant N — REWRITE [attempt 1]
      Headline: [text] [X chars]
      Body: [text] [X chars]
      Fix applied: [one line explaining what was changed and why]

    If no variants were flagged: "No rewrites needed — all variants passed evaluation."
    Save to outputs/copy_rewrites.md.
  agent: campaign_copywriter
  output_file: outputs/copy_rewrites.md
  context:
    - write_meta_ads
    - evaluate_copy

format_for_api:
  description: >
    Take the 5 Meta ad copy variants from write_meta_ads and format them into a
    valid Meta Ads API JSON payload for {product}.

    Required fields:
    - Campaign: name, objective (OUTCOME_LEADS), status (PAUSED),
      special_ad_categories: [] (empty — HOUSING restriction is US/EU only, India is exempt)
    - Ad set: name, daily_budget ({daily_budget_inr} INR), targeting block structured as follows:
        - geo_locations: use pincodes and cities from the targeting brief below
        - age_min / age_max: from demographic targeting in the brief
        - interests: use the Meta interest segments listed in the targeting brief
        - behaviours: use the behavioural segments from the targeting brief
    - Ad creative: headline, body, call_to_action (use "{cta}" for every ad — do not invent other CTA values)

    Targeting brief (use this to populate geo, demographic, and interest fields):
    {targeting}

    Use rewritten variants from rewrite_flagged where available — prefer those over
    the originals from write_meta_ads for any variant that was flagged.
    Use descriptive placeholders for unknown IDs: <AD_ACCOUNT_ID>, <PAGE_ID>.
    Label the entire output as DRY-RUN at the top.
  expected_output: >
    A valid JSON object following Meta campaign creation structure.
    First line comment: "// DRY-RUN -- review and fill placeholders before deploying"
    Targeting block must reflect real pincodes/cities and interest segments from the
    targeting brief — not generic city-level placeholders.
    Formatted with 2-space indentation.
  agent: ad_ops_manager
  context:
    - write_meta_ads
    - rewrite_flagged


